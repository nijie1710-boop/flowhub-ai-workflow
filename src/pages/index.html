<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowHub · 工作流市场</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="icon" href="/assets/flowhub-mark.png">
<link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>

<div class="demo-bar">
  <span class="label">FlowHub Demo</span>
  <span class="demo-group">用户视角</span>
  <span class="demo-pill active" data-view="market">市场</span>
  <span class="demo-pill" data-view="search">搜索</span>
  <span class="demo-pill" data-view="me">我的</span>
  <span class="demo-divider"></span>
  <span class="demo-group">运营视角</span>
  <span class="demo-pill" data-view="admin">管理后台</span>
  <span class="demo-pill" data-view="creator">创作者后台</span>
  <span class="demo-divider"></span>
  <span class="demo-group">接入视角</span>
  <span class="demo-pill" data-view="advertiser">广告主入驻</span>
  <span class="demo-pill" data-view="wizard">接入向导</span>
  <div class="spacer"></div>
  <div class="right-controls">
    <span id="user-status">游客模式</span>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题"><i class="fas fa-moon" id="theme-icon"></i></button>
    <button class="reset-btn" onclick="resetAll()">重置数据</button>
  </div>
</div>

<!-- 视图容器 -->
<div class="view active" id="view-market"></div>
<div class="view" id="view-search"></div>
<div class="view" id="view-detail"></div>
<div class="view" id="view-run"></div>
<div class="view" id="view-me"></div>
<div class="view" id="view-admin"></div>
<div class="view" id="view-creator"></div>
<div class="view" id="view-advertiser"></div>
<div class="view" id="view-wizard"></div>

<!-- 滚动到顶按钮 -->
<button class="scroll-top-btn" id="scroll-top-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">
  <i class="fas fa-arrow-up"></i>
</button>

<!-- 移动端 Tab 栏 -->
<nav class="mobile-tabbar">
  <div class="mobile-tabbar-row">
    <div class="mobile-tab active" data-mobile-view="market" onclick="switchView('market')">
      <i class="fas fa-house"></i><span>市场</span>
    </div>
    <div class="mobile-tab" data-mobile-view="search" onclick="quickSearchFocus()">
      <i class="fas fa-search"></i><span>搜索</span>
    </div>
    <div class="mobile-tab center" onclick="toggleChatbot()">
      <div class="center-btn"><i class="fas fa-wand-magic-sparkles"></i></div>
      <span>AI</span>
    </div>
    <div class="mobile-tab" data-mobile-view="notif" onclick="openMobileNotif()">
      <i class="fas fa-bell"></i><span>通知</span>
    </div>
    <div class="mobile-tab" data-mobile-view="me" onclick="switchView('me')">
      <i class="fas fa-user"></i><span>我的</span>
    </div>
  </div>
</nav>

<!-- 移动端抽屉 -->
<div class="mobile-drawer-bg" id="mobile-drawer-bg" onclick="closeMobileDrawer()"></div>
<aside class="mobile-drawer" id="mobile-drawer"></aside>

<!-- AI 客服悬浮按钮 -->
<div class="chatbot-fab" onclick="toggleChatbot()" id="chatbot-fab">
  <i class="fas fa-comment-dots"></i>
  <span class="chatbot-badge" style="display:none"></span>
</div>

<!-- AI 客服面板 -->
<div class="chatbot-panel" id="chatbot-panel">
  <div class="chatbot-head">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="chatbot-avatar"><i class="fas fa-robot"></i></div>
      <div>
        <div style="font-weight:700;font-size:14px">FlowHub 助手</div>
        <div style="font-size:11px;opacity:0.7;display:flex;align-items:center;gap:5px">
          <span style="width:6px;height:6px;background:#5DCAA5;border-radius:50%;display:inline-block"></span>
          在线 · 通常 30 秒内回复
        </div>
      </div>
    </div>
    <button class="chatbot-close" onclick="toggleChatbot()"><i class="fas fa-times"></i></button>
  </div>
  <div class="chatbot-body" id="chatbot-body">
    <div class="chat-msg bot">
      <div class="chat-bubble">你好!我是 FlowHub 智能助手 👋<br>有什么可以帮你的?</div>
    </div>
    <div class="chat-suggestions">
      <button class="chat-suggest" onclick="askChatbot('怎么升级 Pro')">怎么升级 Pro?</button>
      <button class="chat-suggest" onclick="askChatbot('如何上架工作流')">如何上架工作流?</button>
      <button class="chat-suggest" onclick="askChatbot('退订流程')">怎么退订?</button>
      <button class="chat-suggest" onclick="askChatbot('PicSpark 接入')">PicSpark 怎么接入?</button>
    </div>
  </div>
  <div class="chatbot-input-wrap">
    <input class="chatbot-input" id="chatbot-input" placeholder="输入你的问题…" onkeydown="if(event.key==='Enter') sendChatMsg()">
    <button class="chatbot-send" onclick="sendChatMsg()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

<!-- 模态框容器 -->
<div class="modal-bg" id="modal" onclick="if(event.target===this) closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <i class="fas fa-circle-check"></i>
  <span id="toast-msg"></span>
</div>

<script src="/src/components/workflow-components.js"></script>
<script src="/src/lib/flowhub-app.js"></script>
</body>
</html>
