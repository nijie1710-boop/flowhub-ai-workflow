<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowHub · 工作流市场</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #FAFAF7;
    --bg-elev: #FFFFFF;
    --bg-soft: #F2F1ED;
    --ink: #0F0F0E;
    --ink-2: #3A3935;
    --ink-3: #6B6963;
    --ink-4: #A5A39C;
    --line: rgba(15, 15, 14, 0.08);
    --line-strong: rgba(15, 15, 14, 0.15);
    --self: #1A5D3A;
    --self-bg: #E3F0E8;
    --self-soft: #F0F7F3;
    --ad: #B85C00;
    --ad-bg: #FDEDD8;
    --ad-soft: #FBF6EC;
    --pro: #5B3FA8;
    --pro-bg: #ECE5FA;
    --danger: #B83838;
    --warn: #B47B00;
    --info: #1E3A8A;
    --info-bg: #E8EDFA;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
  }
  [data-theme="dark"] {
    --bg: #0E0E0D;
    --bg-elev: #1A1A18;
    --bg-soft: #242422;
    --ink: #FAFAF7;
    --ink-2: #D8D7D2;
    --ink-3: #A0A09A;
    --ink-4: #6F6E6A;
    --line: rgba(255, 255, 255, 0.1);
    --line-strong: rgba(255, 255, 255, 0.18);
    --self: #5DCAA5;
    --self-bg: rgba(93, 202, 165, 0.16);
    --self-soft: rgba(93, 202, 165, 0.08);
    --ad: #F2A623;
    --ad-bg: rgba(242, 166, 35, 0.16);
    --ad-soft: rgba(242, 166, 35, 0.08);
    --pro: #AFA9EC;
    --pro-bg: rgba(175, 169, 236, 0.16);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', -apple-system, 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* ====================== Hero 大卡(本周精选) ====================== */
  .featured-hero {
    background: linear-gradient(135deg, #0F0F0E 0%, #2A2A28 100%);
    color: #FAFAF7;
    border-radius: var(--radius-xl);
    padding: 36px 40px;
    margin-bottom: 18px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    align-items: center;
    cursor: pointer;
    position: relative;
    overflow: visible;
    transition: transform 0.3s ease;
  }
  .featured-hero:hover { transform: translateY(-2px); }
  .featured-hero::before {
    content: '';
    position: absolute;
    top: -40%; right: -10%;
    width: 60%; height: 180%;
    background: radial-gradient(circle, rgba(255,214,165,0.12) 0%, transparent 60%);
    pointer-events: none;
    clip-path: inset(0 0 0 0 round var(--radius-xl));
  }
  .featured-hero .fh-eyebrow {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.55;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 14px;
  }
  .featured-hero h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 38px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
  }
  .featured-hero p {
    font-size: 14px;
    opacity: 0.7;
    line-height: 1.6;
    max-width: 460px;
    margin-bottom: 22px;
    position: relative;
    z-index: 1;
  }
  .featured-hero .fh-meta {
    display: flex;
    gap: 22px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.7;
    position: relative;
    z-index: 1;
  }
  .featured-hero .fh-meta i { color: #FFD6A5; font-size: 11px; }
  .featured-hero .fh-thumb {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-lg);
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }
  .featured-hero .fh-thumb svg { width: 60%; height: auto; opacity: 0.7; }

  /* ====================== 缩略图占位 ====================== */
  .wf-thumb {
    aspect-ratio: 16/10;
    background: linear-gradient(135deg, var(--bg-soft), var(--bg));
    border-radius: 8px;
    margin: -4px -4px 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .wf-thumb svg { width: 60%; height: auto; opacity: 0.85; }
  .wf-thumb-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.15));
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .wf-card:hover .wf-thumb-overlay { opacity: 1; }

  /* ====================== 在线试用面板(详情页) ====================== */
  .try-panel {
    margin-top: 12px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .try-panel-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
  }
  .try-panel-head .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    background: var(--self-bg);
    color: var(--self);
    border-radius: 4px;
    font-weight: 600;
  }
  .try-body { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .try-side h5 {
    font-size: 11px;
    color: var(--ink-3);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .try-input, .try-output {
    background: var(--bg-soft);
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink-2);
    min-height: 120px;
    white-space: pre-wrap;
    font-family: inherit;
  }
  .try-output { position: relative; }
  .try-output.loading::before {
    content: '⚡ 生成中…';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--ink-3);
    font-family: 'JetBrains Mono', monospace;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  .try-actions {
    margin-top: 10px;
    display: flex;
    gap: 6px;
  }
  .try-btn {
    padding: 6px 12px;
    border: 1px solid var(--line-strong);
    background: var(--bg-elev);
    border-radius: 6px;
    font-size: 11px;
    color: var(--ink-2);
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .try-btn:hover { background: var(--bg-soft); }
  .try-btn.primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .inline-runner {
    margin-top: 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--bg-elev);
    overflow: hidden;
  }
  .inline-runner-head {
    padding: 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .inline-runner-kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--self);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 5px;
  }
  .inline-runner-head h4 {
    font-size: 17px;
    margin-bottom: 4px;
  }
  .inline-runner-head p {
    color: var(--ink-3);
    font-size: 12px;
    line-height: 1.6;
  }
  .inline-runner-badge {
    flex-shrink: 0;
    padding: 5px 10px;
    border-radius: 999px;
    background: var(--self-bg);
    color: var(--self);
    font-size: 11px;
    font-weight: 700;
  }
  .inline-runner-grid {
    display: grid;
    grid-template-columns: minmax(240px, 0.86fr) minmax(280px, 1.14fr);
    gap: 0;
    min-width: 0;
  }
  .runner-form {
    padding: 16px;
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }
  .runner-field label {
    display: block;
    margin-bottom: 6px;
    font-size: 11px;
    color: var(--ink-3);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .runner-input,
  .runner-select,
  .runner-textarea {
    width: 100%;
    border: 1px solid var(--line-strong);
    background: var(--bg);
    color: var(--ink);
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    box-sizing: border-box;
  }
  .runner-input,
  .runner-select {
    height: 40px;
    padding: 0 12px;
  }
  .runner-textarea {
    min-height: 84px;
    resize: vertical;
    padding: 10px 12px;
    line-height: 1.55;
  }
  .runner-two {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .runner-presets {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .runner-preset {
    border: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--ink-2);
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .runner-preset:hover {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .runner-check {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    line-height: 1.5;
    color: var(--ink-2);
  }
  .runner-check input { margin-top: 3px; accent-color: var(--self); }
  .runner-actions {
    display: flex;
    gap: 8px;
    margin-top: 2px;
  }
  .runner-primary,
  .runner-secondary {
    min-height: 40px;
    border-radius: 8px;
    border: 1px solid var(--line-strong);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .runner-primary {
    flex: 1;
    background: var(--self);
    color: #fff;
    border-color: var(--self);
  }
  .runner-secondary {
    padding: 0 14px;
    background: transparent;
    color: var(--ink-2);
  }
  .runner-primary:disabled { opacity: 0.65; cursor: wait; }
  .runner-output {
    min-width: 0;
    min-height: 460px;
    background: var(--bg-soft);
    padding: 16px;
  }
  .runner-empty {
    height: 100%;
    min-height: 428px;
    border: 1px dashed var(--line-strong);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--ink-3);
    font-size: 13px;
    line-height: 1.7;
    padding: 20px;
  }
  .runner-empty i {
    display: block;
    margin-bottom: 10px;
    font-size: 22px;
    color: var(--self);
  }
  .runner-output.loading .runner-empty {
    color: transparent;
    position: relative;
  }
  .runner-output.loading .runner-empty::after {
    content: '生成商品图方案中...';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-3);
    font-family: 'JetBrains Mono', monospace;
    animation: pulse 1.2s infinite;
  }
  .ps-result {
    display: grid;
    gap: 14px;
  }
  .ps-preview {
    position: relative;
    min-height: 260px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: linear-gradient(135deg, #E9EFE7, #FFDAB8);
  }
  .ps-preview::before {
    content: '';
    position: absolute;
    inset: 18px;
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: 8px;
  }
  .ps-product {
    position: absolute;
    left: 50%;
    top: 52%;
    transform: translate(-50%, -50%);
    width: 104px;
    height: 142px;
    border-radius: 28px 28px 18px 18px;
    background: linear-gradient(145deg, rgba(255,255,255,0.92), rgba(232,240,226,0.88));
    box-shadow: 0 22px 40px rgba(15,15,14,0.22), inset -16px -10px 26px rgba(26,93,58,0.12);
  }
  .ps-product::before {
    content: '';
    position: absolute;
    top: -14px;
    left: 33px;
    width: 38px;
    height: 18px;
    border-radius: 10px 10px 3px 3px;
    background: #0F0F0E;
  }
  .ps-product::after {
    content: attr(data-label);
    position: absolute;
    left: 16px;
    right: 16px;
    top: 54px;
    min-height: 40px;
    border-top: 1px solid rgba(15,15,14,0.12);
    border-bottom: 1px solid rgba(15,15,14,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 11px;
    line-height: 1.25;
    color: #1A5D3A;
    font-weight: 700;
  }
  .ps-scene-chip {
    position: absolute;
    top: 18px;
    left: 18px;
    padding: 6px 9px;
    border-radius: 999px;
    background: rgba(255,255,255,0.78);
    color: #0F0F0E;
    font-size: 11px;
    font-weight: 700;
  }
  .ps-preview-copy {
    position: absolute;
    left: 18px;
    right: 18px;
    bottom: 16px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    color: rgba(15,15,14,0.72);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }
  .ps-result-copy {
    display: grid;
    gap: 10px;
  }
  .ps-result-block {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
  }
  .ps-result-block h5 {
    font-size: 12px;
    margin-bottom: 7px;
  }
  .ps-result-block p,
  .ps-result-block li {
    font-size: 12px;
    line-height: 1.65;
    color: var(--ink-2);
  }
  .ps-result-block ul {
    margin: 0;
    padding-left: 16px;
  }
  .sql-code {
    background: #0F0F0E;
    color: #EDECE8;
    border-radius: 8px;
    padding: 14px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.65;
    white-space: pre;
  }
  .sql-meta-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .sql-meta-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px;
  }
  .sql-meta-card span {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .sql-meta-card strong {
    font-size: 13px;
    color: var(--ink);
  }
  .iv-studio {
    display: grid;
    grid-template-columns: minmax(360px, 1.18fr) minmax(320px, 0.82fr);
    min-height: 620px;
  }
  .iv-canvas-panel {
    padding: 16px;
    background: var(--bg-soft);
    border-right: 1px solid var(--line);
    min-width: 0;
  }
  .iv-chat-panel {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
    background: var(--bg-elev);
  }
  .iv-panel-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .iv-panel-top h5 {
    font-size: 13px;
    margin: 0;
  }
  .iv-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px;
    border-radius: 999px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    color: var(--ink-3);
    font-size: 11px;
    white-space: nowrap;
  }
  .iv-canvas-stage {
    min-height: 360px;
    border: 1px dashed var(--line-strong);
    border-radius: 10px;
    background:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px),
      var(--bg-elev);
    background-size: 28px 28px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    overflow-x: auto;
  }
  .iv-canvas-stage.drag-over {
    border-color: var(--self);
    box-shadow: 0 0 0 3px rgba(26,93,58,0.1);
  }
  .iv-canvas-empty {
    width: 100%;
    text-align: center;
    color: var(--ink-3);
    font-size: 13px;
    line-height: 1.7;
  }
  .iv-shot-node {
    flex: 0 0 176px;
    position: relative;
  }
  .iv-shot-card {
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg-elev);
    box-shadow: 0 8px 24px rgba(15,15,14,0.08);
  }
  .iv-shot-preview,
  .iv-asset-preview {
    min-height: 118px;
    position: relative;
    overflow: hidden;
  }
  .iv-shot-preview::before,
  .iv-asset-preview::before {
    content: '';
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(255,255,255,0.52);
    border-radius: 8px;
  }
  .iv-shot-preview::after,
  .iv-asset-preview::after {
    content: attr(data-scene);
    position: absolute;
    left: 14px;
    right: 14px;
    bottom: 12px;
    color: rgba(15,15,14,0.72);
    font-size: 12px;
    font-weight: 700;
  }
  .iv-shot-body {
    padding: 9px 10px;
  }
  .iv-shot-title {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .iv-shot-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
  }
  .iv-connector {
    flex: 0 0 42px;
    height: 2px;
    background: var(--self);
    position: relative;
    opacity: 0.8;
  }
  .iv-connector::after {
    content: '';
    position: absolute;
    right: -1px;
    top: 50%;
    width: 7px;
    height: 7px;
    border-top: 2px solid var(--self);
    border-right: 2px solid var(--self);
    transform: translateY(-50%) rotate(45deg);
  }
  .iv-video-box {
    margin-top: 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--bg-elev);
    padding: 12px;
    min-height: 118px;
  }
  .iv-video-empty {
    height: 94px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-3);
    font-size: 12px;
    text-align: center;
    line-height: 1.6;
  }
  .iv-video-result {
    display: grid;
    grid-template-columns: 132px 1fr;
    gap: 12px;
    align-items: center;
  }
  .iv-video-thumb {
    height: 86px;
    border-radius: 8px;
    background: linear-gradient(135deg, #0F0F0E, #1A5D3A);
    position: relative;
    overflow: hidden;
  }
  .iv-video-thumb::after {
    content: '▶';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 20px;
  }
  .iv-video-copy h5 {
    font-size: 13px;
    margin-bottom: 5px;
  }
  .iv-video-copy p {
    font-size: 12px;
    color: var(--ink-3);
    line-height: 1.6;
  }
  .iv-chat-log {
    flex: 1;
    min-height: 278px;
    max-height: 430px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-right: 4px;
  }
  .iv-msg {
    max-width: 92%;
    padding: 10px 12px;
    border-radius: 12px;
    font-size: 12px;
    line-height: 1.65;
  }
  .iv-msg.bot {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    color: var(--ink-2);
  }
  .iv-msg.user {
    align-self: flex-end;
    background: var(--ink);
    color: var(--bg);
  }
  .iv-assets {
    display: grid;

  /* ====================== 通知红点 ====================== */

  /* ====================== 数字滚动动画 ====================== */

  /* ====================== 全局微交互打磨 ====================== */
  /* 全局按钮按下效果 */
  button, .demo-pill, .cat-pill, .hot-tag, .wf-card, .rank-item {
    -webkit-tap-highlight-color: transparent;
  }
  button:active, .demo-pill:active, .cat-pill:active {
    transform: scale(0.97);
  }
  /* 卡片精致 hover */
  .wf-card {
    transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1),
                box-shadow 0.25s ease,
                border-color 0.2s ease;
  }
  .wf-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(15,15,14,0.08);
    border-color: var(--line-strong);
  }
  .wf-card:active {
    transform: translateY(-1px);
  }
  /* Hero 大卡 hover */
  .featured-hero {
    transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1),
                box-shadow 0.3s ease;
  }
  .featured-hero:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 36px rgba(15,15,14,0.18);
  }
  /* 主按钮 hover */
  .btn-primary {
    transition: all 0.18s ease;
    position: relative;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(15,15,14,0.18);
  }
  /* Pro 升级按钮 */
  .btn-pro {
    transition: all 0.2s ease;
    box-shadow: 0 2px 8px rgba(255, 214, 165, 0.2);
  }
  .btn-pro:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(255, 214, 165, 0.35);
  }
  /* CTA 大按钮 */
  .side-cta {
    transition: all 0.2s ease;
  }
  .side-cta:hover:not(.outline):not(:disabled) {
    background: #2A2A28;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(15,15,14,0.15);
  }
  .side-cta.outline:hover {
    background: var(--bg-soft);
  }
  /* 通用 fade-in 加载 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in-up {
    animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  /* 卡片错峰进入动画 */
  .wf-grid .wf-card {
    animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  .wf-grid .wf-card:nth-child(1) { animation-delay: 0.02s; }
  .wf-grid .wf-card:nth-child(2) { animation-delay: 0.06s; }
  .wf-grid .wf-card:nth-child(3) { animation-delay: 0.1s; }
  .wf-grid .wf-card:nth-child(4) { animation-delay: 0.14s; }
  .wf-grid .wf-card:nth-child(5) { animation-delay: 0.18s; }
  .wf-grid .wf-card:nth-child(6) { animation-delay: 0.22s; }
  .wf-grid .wf-card:nth-child(7) { animation-delay: 0.26s; }
  .wf-grid .wf-card:nth-child(8) { animation-delay: 0.3s; }

  /* 输入框焦点反馈 */
  input:focus, textarea:focus, select:focus {

  /* ====================== 骨架屏 ====================== */
  @keyframes skeleton {
    0% { background-position: -200px 0; }
    100% { background-position: calc(200px + 100%) 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, var(--bg-soft) 25%, var(--line) 50%, var(--bg-soft) 75%);

  .skeleton-card {

    border-radius: 14px;
    padding: 14px;
    min-height: 280px;

  .skeleton-line { height: 12px; border-radius: 4px; margin-bottom: 8px; }

  }

  .skeleton-card .skeleton-title { width: 70%; height: 16px; }
  .skeleton-card .skeleton-desc { width: 90%; height: 12px; }
  .skeleton-card .skeleton-tags { display: flex; gap: 6px; margin: 10px 0; }
  .skeleton-card .skeleton-tag { width: 50px; height: 20px; border-radius: 10px; }
  .skeleton-card .skeleton-foot { display: flex; justify-content: space-between; margin-top: auto; }
  .skeleton-card .skeleton-foot-l { width: 60px; height: 12px; }
  .skeleton-card .skeleton-foot-r { width: 45px; height: 12px; }

  /* ====================== 创作者申请 ====================== */
  .creator-type-btn {
    flex: 1; display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; border: 1.5px solid var(--line); border-radius: 12px;
    background: var(--bg); cursor: pointer; transition: all 0.2s; text-align: left;
  }
  .creator-type-btn:hover { border-color: var(--ink-3); }
  .creator-type-btn.active { border-color: var(--self); background: var(--self-soft); }
  .creator-type-btn i { font-size: 18px; flex-shrink: 0; }

  /* ====================== 跳转过渡 ====================== */
  .redirect-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .redirect-overlay.show { opacity: 1; }
  .redirect-card {
    background: var(--bg-elev); border-radius: 20px; padding: 40px 36px;
    text-align: center; max-width: 380px; width: 90%;

    transform: translateY(20px) scale(0.95); transition: transform 0.3s ease;
  }
  .redirect-overlay.show .redirect-card { transform: translateY(0) scale(1); }

  .redirect-host { font-size: 12px; color: var(--ink-3); font-family: 'JetBrains Mono', monospace; margin-bottom: 20px; }
  .redirect-countdown { margin: 0 auto 6px; }

  .redirect-ring svg { width: 100%; height: 100%; }
  .redirect-ring-fill { transition: stroke-dashoffset 0.8s ease; }
  .redirect-num {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--ink);
  }

  .redirect-actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
  .redirect-go {

  /* ====================== 创作者后台 ====================== */
  .creator-hero {

  .creator-earning-stat .l {

    opacity: 0.6;

  /* ====================== 视图切换 ====================== */
  .view { display: none; }

  .wf-card {
    background: var(--bg-elev);

  /* ====================== 详情页大图轮播 ====================== */
  .gallery {
    margin-bottom: 28px;
  }
  .gallery-main {
    position: relative;
    aspect-ratio: 16 / 9;
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg-soft);
    margin-bottom: 12px;
  }
  .gallery-slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.4s ease;
    display: flex;
    flex-direction: column;
  }
  .gallery-slide.active {
    opacity: 1;
    z-index: 1;
  }
  .gallery-image {
    flex: 1;
    overflow: hidden;
  }
  .gallery-image svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .gallery-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.65));
    color: white;
    padding: 28px 24px 18px;
  }
  .gallery-caption-label {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 4px;
  }
  .gallery-caption-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 600;
  }
  .gallery-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    border: none;
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    z-index: 5;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .gallery-nav:hover {
    background: var(--ink);
    color: var(--bg);
    transform: translateY(-50%) scale(1.06);
  }
  .gallery-nav.prev { left: 14px; }
  .gallery-nav.next { right: 14px; }
  .gallery-dots {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 5;
  }
  .gallery-dot {
    width: 7px;
    height: 7px;
    background: rgba(255,255,255,0.45);
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.15s;
  }
  .gallery-dot.active {
    background: white;
    width: 22px;
    border-radius: 4px;
  }
  .gallery-thumbs {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 1fr;
    gap: 8px;
  }
  .gallery-thumb {
    cursor: pointer;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: all 0.15s;
    opacity: 0.7;
  }
  .gallery-thumb:hover { opacity: 1; }
  .gallery-thumb.active {
    border-color: var(--ink);
    opacity: 1;
  }
  .gallery-thumb-img {
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: var(--bg-soft);
  }
  .gallery-thumb-img svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .gallery-thumb-label {
    padding: 6px 8px;
    font-size: 10px;
    text-align: center;

  }
  .side-cta {

  /* ====================== 调色卡片 ====================== */

  .tile-orange { background: #FBE0C2; color: #B85C00; }
  .tile-purple { background: #E3D9F5; color: #5B3FA8; }
  .tile-pink { background: #F5D9E3; color: #B83A6B; }
  .tile-teal { background: #D9EEEC; color: #1F6B68; }
  .tile-amber { background: #FAE7C2; color: #8C6510; }
  .tile-gray { background: #E8E7E3; color: #444441; }

  /* ====================== Toast ====================== */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(120%);

    color: var(--bg);
    padding: 12px 20px;
    border-radius: 9px;
    font-size: 12px;
    font-weight: 500;
    z-index: 2000;
    transition: transform 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 32px rgba(15,15,14,0.2);
    max-width: 90vw;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast i { color: #5DCAA5; font-size: 12px; }
  .toast.err i { color: #FF8FAB; }

  /* ====================== 模态框 ====================== */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(15,15,14,0.55);

    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1500;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-elev);
    border-radius: var(--radius-lg);
    padding: 28px;
    max-width: 460px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal.wide { max-width: 640px; }
  .modal-close {
    position: absolute;
    top: 18px; right: 18px;
    width: 28px; height: 28px;
    background: var(--bg-soft);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-3);
  }
  .modal h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 700;

  }
  .modal .modal-sub {
    font-size: 13px;
    color: var(--ink-3);
    margin-bottom: 22px;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;

    font-weight: 500;
    color: var(--ink-2);
    margin-bottom: 5px;
  }
  .field input, .field textarea, .field select {
    width: 100%;

  }

  .field textarea { resize: vertical; min-height: 70px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .color-row { display: flex; gap: 6px; }
  .color-swatch {

  .modal-actions {

    gap: 8px;
    margin-top: 20px;
  }
  .modal-actions button {
    flex: 1;
    padding: 11px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;

    color: var(--ink);
  }
  .modal-actions .primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  /* ====================== 登录 / 注册 ====================== */

  .auth-workflow-row {

  }
  .auth-workflow-row:first-of-type { border-top: none; }
  .auth-workflow-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;

    font-size: 11px;
  }
  .auth-workflow-name {
    font-size: 12px;

  }

  .auth-benefits {

    gap: 8px;
    padding: 9px 10px;
    background: rgba(255,255,255,0.45);

  .auth-copy {

  .auth-copy h2 {

  .auth-copy p {

  .auth-soft-note {

  .auth-tabs {

    gap: 4px;

    border-radius: 10px;
    padding: 4px;

  }
  .auth-tab {
    flex: 1;
    padding: 9px;
    text-align: center;
    border-radius: 7px;
    font-size: 13px;
    cursor: pointer;
    color: var(--ink-3);
    transition: all 0.15s;
    font-weight: 500;
  }
  .auth-tab.active {

    font-weight: 600;
    box-shadow: 0 1px 3px rgba(15,15,14,0.06);
  }
  .auth-code-btn {
    padding: 0 16px;
    background: var(--bg-soft);
    border: 1px solid var(--line-strong);
    border-radius: 7px;
    font-size: 12px;
    color: var(--ink-2);
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;

  }
  .auth-form-hint {

  .auth-code-btn:hover {

  .auth-submit-btn {

  }
  .pricing-card:hover {
    border-color: var(--line-strong);
    transform: translateY(-2px);
  }
  .pricing-card.featured {
    background: var(--ink);

  }
  .pricing-card.current {
    border-color: var(--self);

  }
  .pricing-card .pop {

    top: -10px;

    border-radius: 999px;

    margin-bottom: 4px;
  }
  .pricing-card .price-big .num {

    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;

  .pricing-card .price-big .unit {

  .pricing-cta {
    width: 100%;
    padding: 11px;

    color: var(--ink);

    margin-top: 4px;
  }

  /* 表格 */

  .badge-rejected { background: #F5DADA; color: var(--danger); }
  .status-tgl {

  /* 图表 */
  .chart-card {
    background: var(--bg-elev);

    border-radius: var(--radius-lg);

    margin-bottom: 24px;

    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;

  .funnel-num {

  .ad-slot .price-tag {

    font-weight: 700;

  .me-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 700;

  .me-meta {

    gap: 10px;
    font-size: 12px;

  .me-head {

  /* 响应式 */

    .cnav-right { gap: 6px; }
    .cnav-link { display: none; }
    .container { padding: 24px 16px; }

    .hero h1 { font-size: 30px; }
    .hero-sub { font-size: 13px; }
    .hero-cta-row { flex-direction: column; }
    .hero-cta-primary, .hero-cta-secondary { width: 100%; justify-content: center; }
    .home-search-panel { max-width: none; }
    .home-search-panel button { padding: 0 14px; }

    .hero-task-row { max-width: 100%; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 3px; margin-bottom: 16px; }
    .hero-task-row::-webkit-scrollbar { display: none; }

    .hero-product-top { align-items: center; }
    .hero-feature-workflow { grid-template-columns: 1fr; }
    .hero-feature-thumb { display: none; }
    .hero-mini-grid { grid-template-columns: 1fr; }
    .hero-mini-workflow:nth-child(n+4) { display: none; }
    .hero-path-row { max-width: 100%; overflow-x: auto; justify-content: flex-start; }
    .hero-path-row::-webkit-scrollbar { display: none; }

function normalizeDataShape(data) {
  if (!data || typeof data !== 'object') return JSON.parse(JSON.stringify(SEED_DATA));
  if (!Array.isArray(data.workflows)) data.workflows = [];
  const existingWorkflowIds = new Set(data.workflows.map(w => w && w.id).filter(Boolean));
  (SEED_DATA.workflows || []).forEach(seedWf => {
    if (!existingWorkflowIds.has(seedWf.id)) {
      data.workflows.push(JSON.parse(JSON.stringify(seedWf)));
    }
  });
  if (!Array.isArray(data.clicks)) data.clicks = [];
  if (!Array.isArray(data.inline_runs)) data.inline_runs = [];
  if (!Array.isArray(data.reviews)) data.reviews = [];
  if (!Array.isArray(data.ad_applications)) data.ad_applications = [];
  if (!Array.isArray(data.ad_slots)) data.ad_slots = [];
  if (!Array.isArray(data.tool_submissions)) {
    data.tool_submissions = JSON.parse(JSON.stringify(SEED_DATA.tool_submissions || []));
  }
  return data;
}

function getData() {
  if (_apiCache) {
    const localUser = localStorage.getItem('flowhub_user');
    const localNotifs = localStorage.getItem('flowhub_notifs');
    const merged = Object.assign({}, _apiCache);
    if (localUser) merged.user = JSON.parse(localUser);
    if (localNotifs) merged._notifs = JSON.parse(localNotifs);
    return normalizeDataShape(merged);
  }
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) {
    saveData(JSON.parse(JSON.stringify(SEED_DATA)));
    return normalizeDataShape(JSON.parse(JSON.stringify(SEED_DATA)));
  }
  try {
    const data = normalizeDataShape(JSON.parse(raw));
    if (!Array.isArray(JSON.parse(raw).tool_submissions)) saveData(data);
    return data;
  } catch {
    saveData(JSON.parse(JSON.stringify(SEED_DATA)));
    return normalizeDataShape(JSON.parse(JSON.stringify(SEED_DATA)));
  }
}

function saveData(data) {
  normalizeDataShape(data);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  if (data.user !== undefined) {
    localStorage.setItem('flowhub_user', JSON.stringify(data.user));
  }
  if (data._notifs !== undefined) {
    localStorage.setItem('flowhub_notifs', JSON.stringify(data._notifs));
  }
}

let _clickStats = null;
let _reviewsCache = {};
let _adminDataLoaded = false;

function authHeaders(extra) {
  const headers = Object.assign({}, extra || {});
  const token = localStorage.getItem('flowhub_token');
  if (token) headers.Authorization = 'Bearer ' + token;
  return headers;
}

function _parseWorkflow(w) {
  return {
    ...w,
    rating: parseFloat(w.rating) || 0,
    review_count: parseInt(w.review_count) || 0,
    seed_clicks: parseInt(w.seed_clicks) || 0,
    seed_clicks_7d: parseInt(w.seed_clicks_7d) || 0,
    price_amount: parseFloat(w.price_amount) || 0,
    examples: w.examples || []
  };
}

async function loadDataFromAPI() {
  try {
    const resp = await fetch(API_BASE + '/workflows?limit=100');
    const json = await resp.json();
    if (json.ok) {
      _apiCache = {
        workflows: json.data.workflows.map(_parseWorkflow),
        clicks: [],
        reviews: [],
        ad_applications: [],
        ad_slots: [],
        tool_submissions: [],
        user: null,
        _notifs: null
      };
      _apiLoaded = true;
      console.log('[FlowHub] Workflows loaded:', _apiCache.workflows.length);
      loadClickStatsAsync();
      loadAdDataAsync();
    }
  } catch (err) {
    console.warn('[FlowHub] API unavailable, using localStorage fallback:', err.message);
    _apiCache = null;
  }
}

async function loadAdminDataAsync() {
  if (!_apiLoaded || !_apiCache) return;
  try {
    const resp = await fetch(API_BASE + '/data', { headers: authHeaders() });
    const json = await resp.json();
    if (json.ok) {
      _apiCache = normalizeDataShape({
        ..._apiCache,
        workflows: (json.data.workflows || []).map(_parseWorkflow),
        reviews: json.data.reviews || [],
        clicks: json.data.clicks || [],
        ad_applications: json.data.ad_applications || [],
        ad_slots: json.data.ad_slots || [],
        tool_submissions: json.data.tool_submissions || [],
        user: _apiCache.user,
        _notifs: _apiCache._notifs
      });
      _adminDataLoaded = true;
      console.log('[FlowHub] Admin data loaded');
    }
  } catch (err) {
    console.warn('[FlowHub] Admin data load failed:', err.message);
  }
}

async function loadClickStatsAsync() {
  try {
    const resp = await fetch(API_BASE + '/clicks/stats');
    const json = await resp.json();
    if (json.ok) {
      _clickStats = json.data;
      console.log('[FlowHub] Click stats loaded');
    }
  } catch (err) {
    console.warn('[FlowHub] Click stats load failed:', err.message);
  }
}

async function loadAdDataAsync() {
  try {
    const [appsResp, slotsResp] = await Promise.all([
      fetch(API_BASE + '/ad-applications', { headers: authHeaders() }),
      fetch(API_BASE + '/ad-slots')
    ]);
    const [appsJson, slotsJson] = await Promise.all([appsResp.json(), slotsResp.json()]);
    if (appsJson.ok) _apiCache.ad_applications = appsJson.data.applications || [];
    if (slotsJson.ok) _apiCache.ad_slots = slotsJson.data.slots || [];
    normalizeDataShape(_apiCache);
    console.log('[FlowHub] Ad data loaded');
  } catch (err) {
    console.warn('[FlowHub] Ad data load failed:', err.message);
  }
}

async function loadReviewsForWorkflow(wfId) {
  if (_reviewsCache[wfId]) return _reviewsCache[wfId];
  try {
    const resp = await fetch(API_BASE + '/workflows/' + wfId + '/reviews?limit=50');
    const json = await resp.json();
    if (json.ok) {
      _reviewsCache[wfId] = json.data.reviews || [];
      return _reviewsCache[wfId];
    }
  } catch (err) {
    console.warn('[FlowHub] Reviews load failed for', wfId, err.message);
  }
  const data = getData();
  return (data.reviews || []).filter(r => r.workflow_id === wfId);
}

async function apiPost(path, body) {
  try {
    const resp = await fetch(API_BASE + path, {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(body)
    });
    return await resp.json();
  } catch (err) {
    console.warn('[FlowHub] API POST failed:', path, err.message);
    return { ok: false };
  }
}

async function apiPatch(path, body) {
  try {
    const resp = await fetch(API_BASE + path, {
      method: 'PATCH',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(body)
    });
    return await resp.json();
  } catch (err) {
    console.warn('[FlowHub] API PATCH failed:', path, err.message);
    return { ok: false };
  }
}

function getViewPath(view) {
  const useHashRouting = location.hostname === 'localhost' ||

    location.pathname.endsWith('.html');
  if (useHashRouting) {
    return '/index.html' + (view === 'market' ? '' : '#' + view);
  }
  return view === 'market' ? '/' : '/' + view;
}

function switchView(view, skipPush) {
  state.view = view;

  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });

  if (view !== 'detail' && view !== 'run') document.title = VIEW_TITLES[view] || 'FlowHub';

  if (!skipPush) {
    history.pushState({ view }, '', getViewPath(view));
  }
}

(function initRoute() {
  const validViews = ['market', 'search', 'me', 'admin', 'creator', 'advertiser', 'wizard', 'detail', 'run'];
  const hashView = location.hash.replace(/^#\/?/, '');
  const pathView = location.pathname.replace(/^\//, '').replace(/\.html$/, '') || 'market';
  const initialView = validViews.includes(hashView)
    ? hashView
    : (validViews.includes(pathView) ? pathView : 'market');
  history.replaceState({ view: initialView }, '', getViewPath(initialView));
  if (initialView !== 'market') {
    setTimeout(() => switchView(initialView, true), 0);
  }
})();

function shortUrl(url) {
  try {
    const u = new URL(url);
    return u.hostname + (u.pathname !== '/' ? u.pathname : '');
  } catch {
    return url.slice(0, 32);
  }
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function jsString(s) {
  return String(s || '')
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\r?\n/g, '\\n');
}

function jsAttr(s) {
  return escapeHtml(jsString(s));
}

function stars(rating) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.5;
  let html = '';
  for (let i = 0; i < full; i++) html += '<i class="fas fa-star"></i>';
  if (half) html += '<i class="fas fa-star-half-stroke"></i>';
  const empty = 5 - full - (half ? 1 : 0);
  for (let i = 0; i < empty; i++) html += '<i class="far fa-star"></i>';
  return html;
}

function showToast(msg, err) {

  icon.className = err ? 'fas fa-circle-exclamation' : 'fas fa-circle-check';
  toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

function openExternalWorkflow(wfId) {
  runWorkflow(wfId, { external: true, source: 'external_visit' });
}

function recordWorkflowClick(data, wfId, options = {}) {
  const searchQuery = options.search_query !== undefined
    ? options.search_query
    : (state.view === 'search' ? state.searchQuery : '');
  const clickObj = {
    id: 'clk_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    workflow_id: wfId,
    user_id: data.user ? data.user.id : null,
    source: options.source || (state.view === 'search' ? 'search' : 'market'),
    search_query: searchQuery ? searchQuery.trim() : null,
    clicked_at: new Date().toISOString()
  };
  data.clicks.push(clickObj);
  saveData(data);
  if (_apiLoaded) {
    apiPost('/workflows/' + wfId + '/click', {
      source: clickObj.source,
      search_query: clickObj.search_query,
      user_id: data.user ? data.user.id : null
    });
  }
  return clickObj;
}

function openSearchResult(wfId) {
  const data = getData();
  const wf = data.workflows.find(w => w.id === wfId);
  if (!wf) return;
  recordWorkflowClick(data, wfId, {
    source: 'search_result',
    search_query: state.searchQuery
  });
  goToDetail(wfId);
}

function runWorkflow(wfId, options = {}) {
  const data = getData();
  const wf = data.workflows.find(w => w.id === wfId);
  if (!wf) return;

  if (isInlineRunnerWorkflow(wf) && !options.external) {
    scrollToInlineRunner(wfId);
    showToast('已打开自营工作流执行面板');
    return;
  }

  // 权限校验:自营 + Pro 工作流需要 Pro 会员
  if (wf.type === 'self' && wf.price_model === 'pro') {
    if (!data.user) {
      showToast('请先登录', true);
      openLogin();
      return;
    }
    if (data.user.tier !== 'pro') {
      showToast('需要 Pro 会员才能使用', true);
      openPricing();
      return;
    }
  }

  // 防刷:同一 wf 5 秒内只算 1 次点击
  const recentClicks = data.clicks.filter(c =>
    c.workflow_id === wfId &&
    c.source !== 'search_result' &&
    (Date.now() - new Date(c.clicked_at).getTime()) < 5000
  );
  if (recentClicks.length > 0) {
    showToast('请稍后再点击', true);
    return;
  }

  // 找到立即使用按钮,显示加载状态
  const ctaButtons = document.querySelectorAll('.side-cta:not(.outline)');
  ctaButtons.forEach(btn => {
    if (btn.textContent.includes('立即使用') || btn.textContent.includes('解锁')) {
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>&nbsp;准备启动…';
    }
  });

  // 记录点击
  recordWorkflowClick(data, wfId, {
    source: options.source || (state.view === 'search' ? 'search' : 'market'),
    search_query: options.search_query !== undefined ? options.search_query : state.searchQuery
  });

  // 跳转(归因参数)
  const url = new URL(wf.target_url);
  url.searchParams.set('from', 'flowhub');
  url.searchParams.set('wf_id', wfId);
  if (data.user) url.searchParams.set('uid', data.user.id);

  if (wf.type === 'recommend') {
    showRedirectTransition(wf, url.toString());
    ctaButtons.forEach(btn => { btn.disabled = false; btn.innerHTML = '<i class="fas fa-external-link-alt"></i>&nbsp;访问官网'; });
  } else {
    showToast(`正在启动 ${wf.name}…`);
    setTimeout(() => {
      ctaButtons.forEach(btn => { btn.disabled = false; btn.innerHTML = '<i class="fas fa-play"></i>&nbsp;立即使用'; });
      render();
    }, 800);
  }
}

function showRedirectTransition(wf, targetUrl) {
  let countdown = 3;
  let host = '';
  try { host = new URL(targetUrl).hostname; } catch(e) { host = targetUrl; }
  const overlay = document.createElement('div');
  overlay.className = 'redirect-overlay';
  overlay.innerHTML = `
    <div class="redirect-card">
      <div class="redirect-icon" style="background:${wf.cover_color}22;color:${wf.cover_color}">
        <i class="fas fa-external-link-alt"></i>
      </div>
      <h3>即将离开 FlowHub</h3>
      <p class="redirect-target">${escapeHtml(wf.name)}</p>
      <p class="redirect-host">${escapeHtml(host)}</p>
      <div class="redirect-countdown">
        <div class="redirect-ring">
          <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="none" stroke="var(--line)" stroke-width="2.5"/><circle class="redirect-ring-fill" cx="20" cy="20" r="18" fill="none" stroke="${wf.cover_color}" stroke-width="2.5" stroke-dasharray="113" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 20 20)"/></svg>
          <span class="redirect-num">${countdown}</span>
        </div>
      </div>
      <p class="redirect-hint">秒后自动跳转</p>
      <div class="redirect-actions">
        <button class="redirect-go" onclick="window.open('${targetUrl.replace(/'/g, "\\'")}', '_blank'); this.closest('.redirect-overlay').remove()">
          <i class="fas fa-arrow-right"></i> 立即前往
        </button>
        <button class="redirect-cancel" onclick="this.closest('.redirect-overlay').remove()">取消</button>
      </div>
      <p class="redirect-disclaimer">你即将访问第三方网站,FlowHub 不对其内容负责</p>
    </div>
  `;
  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('show'));

  const ring = overlay.querySelector('.redirect-ring-fill');
  const numEl = overlay.querySelector('.redirect-num');
  const step = 113 / countdown;
  const timer = setInterval(() => {
    countdown--;
    if (numEl) numEl.textContent = countdown;
    if (ring) ring.style.strokeDashoffset = (3 - countdown) * step;
    if (countdown <= 0) {
      clearInterval(timer);
      window.open(targetUrl, '_blank');
      overlay.remove();
    }
  }, 1000);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) { clearInterval(timer); overlay.remove(); } });
}

function quickSearch(q) {
  state.activeCategory = '全部';
  addSearchHistory(q);
  hideSearchDropdown();
  startSearch(q);
}

function startSearchFromInput(inputId) {
  const input = document.getElementById(inputId);
  startSearch(input ? input.value : state.searchQuery);
}

function startSearch(q, options = {}) {
  const query = String(q || '').trim();
  state.searchQuery = query;
  state.searchError = '';
  state.searchLoading = true;
  if (!options.keepFilters) {
    state.searchCategory = '全部';
    state.searchType = 'all';
  }
  if (query.length >= 2) addSearchHistory(query);
  hideSearchDropdown();
  if (state.view !== 'search') {
    switchView('search');
  } else {
    render();
  }
  clearTimeout(window._flowhubSearchTimer);
  window._flowhubSearchTimer = setTimeout(() => {
    state.searchLoading = false;
    if (state.view === 'search') render();
  }, options.immediate ? 80 : 260);
}

function getSearchableText(wf) {
  return [
    wf.name,
    wf.tagline,
    wf.description,
    wf.category,
    ...(wf.tags || [])
  ].join(' ').toLowerCase();
}

function filterWorkflowsForSearch(workflows) {
  const query = state.searchQuery.trim().toLowerCase();
  return workflows.filter(wf => {
    if (query && !getSearchableText(wf).includes(query)) return false;
    if (state.searchCategory !== '全部' && wf.category !== state.searchCategory) return false;
    if (state.searchType === 'self' && wf.type !== 'self') return false;
    if (state.searchType === 'external' && wf.type !== 'recommend') return false;
    if (state.searchType === 'promo' && !isPromotedWorkflow(wf)) return false;
    return true;
  });
}

function getSearchTypeOptions(workflows) {
  return [
    { id: 'all', label: '全部类型', count: workflows.length },
    { id: 'self', label: '站内工作流', count: workflows.filter(w => w.type === 'self').length },
    { id: 'external', label: '外部工具', count: workflows.filter(w => w.type === 'recommend').length },
    { id: 'promo', label: '广告推广', count: workflows.filter(isPromotedWorkflow).length }
  ];
}

function setSearchCategory(c) {
  state.searchCategory = c;
  state.searchLoading = true;
  render();
  clearTimeout(window._flowhubSearchTimer);
  window._flowhubSearchTimer = setTimeout(() => {
    state.searchLoading = false;
    render();
  }, 160);
}

function setSearchType(t) {
  state.searchType = t;
  state.searchLoading = true;
  render();
  clearTimeout(window._flowhubSearchTimer);
  window._flowhubSearchTimer = setTimeout(() => {
    state.searchLoading = false;
    render();
  }, 160);
}

function clearSearchFilters() {
  state.searchQuery = '';
  state.searchCategory = '全部';
  state.searchType = 'all';
  state.searchLoading = false;
  state.searchError = '';
  render();
}

function getSearchHistory() {
  try { return JSON.parse(localStorage.getItem('flowhub_search_history') || '[]'); } catch { return []; }
}
function addSearchHistory(q) {
  if (!q || q.length < 2) return;
  let h = getSearchHistory().filter(x => x !== q);
  h.unshift(q);
  if (h.length > 8) h = h.slice(0, 8);
  localStorage.setItem('flowhub_search_history', JSON.stringify(h));
}
function clearSearchHistory() {
  localStorage.removeItem('flowhub_search_history');
  showSearchDropdown();
}

function showSearchDropdown() {
  const dd = document.getElementById('search-dropdown');
  if (!dd) return;
  const history = getSearchHistory();
  const hotTags = ['小红书', '商品图', '翻译', 'SQL', '海报', '会议纪要', '代码审查', '简历'];
  dd.innerHTML = `
    ${history.length > 0 ? `
      <div class="search-dropdown-section" style="display:flex;justify-content:space-between;align-items:center">
        <span>搜索历史</span>
        <span class="search-dropdown-clear" onclick="event.stopPropagation(); clearSearchHistory()">清除</span>
      </div>
      ${history.map(h => `
        <div class="search-dropdown-item" onclick="quickSearch('${escapeHtml(h)}')">
          <i class="fas fa-clock"></i><span>${escapeHtml(h)}</span>
        </div>
      `).join('')}
    ` : ''}
    <div class="search-dropdown-section">热门搜索</div>
    ${hotTags.map(t => `
      <div class="search-dropdown-item" onclick="quickSearch('${escapeHtml(t)}')">
        <i class="fas fa-fire" style="color:var(--ad)"></i><span>${escapeHtml(t)}</span>
      </div>
    `).join('')}
  `;
  dd.classList.add('show');
}
function hideSearchDropdown() {
  const dd = document.getElementById('search-dropdown');
  if (dd) dd.classList.remove('show');
}

function bindSearchBox(input, options = {}) {
  if (!input) return;
  input.value = state.searchQuery;
  let timer = null;
  input.addEventListener('input', (e) => {
    const query = e.target.value;
    state.searchQuery = query;
    state.searchError = '';
    if (options.dropdown) hideSearchDropdown();
    clearTimeout(timer);
    timer = setTimeout(() => {
      startSearch(query, { keepFilters: true });
    }, query.trim() ? 280 : 120);
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      startSearch(input.value, { keepFilters: true, immediate: true });
    }
  });
}

function bindGlobalSearch() {
  const activeView = document.getElementById('view-' + state.view);
  if (!activeView) return;
  bindSearchBox(activeView.querySelector('.cnav-search input'), { dropdown: true });
  bindSearchBox(activeView.querySelector('#home-search-input'));
  bindSearchBox(activeView.querySelector('#search-page-input'), { searchPage: true });
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('#cnav-search-wrap')) hideSearchDropdown();
});

const LIVE_USERS = ['用户***18', '小红书运营***', '电商小赵***', '某 MCN***', '跨境老王***', '设计师***', '咖啡店主***', '宝妈***', '某独立站***', '内容创业者***'];
const LIVE_ACTIONS = ['正在使用', '调用了', '订阅了', '收藏了', '完成了', '推荐了'];

function renderLiveFeedItems() {
  const data = getData();
  const wfs = data.workflows.filter(w => w.status === 'active');
  const items = [];
  for (let i = 0; i < 8; i++) {
    const user = LIVE_USERS[Math.floor(Math.random() * LIVE_USERS.length)];
    const wf = wfs[Math.floor(Math.random() * wfs.length)];
    const action = LIVE_ACTIONS[Math.floor(Math.random() * LIVE_ACTIONS.length)];
    if (!wf) continue;
    const seconds = Math.floor(Math.random() * 60);
    items.push(`<div class="live-feed-item"><strong>${user}</strong> ${action} <span class="wf-name">${escapeHtml(wf.name)}</span> · ${seconds} 秒前</div>`);
  }
  return items.join('');
}

let liveFeedTimer = null;
function startLiveFeed() {
  if (liveFeedTimer) clearInterval(liveFeedTimer);
  liveFeedTimer = setInterval(() => {
    const container = document.getElementById('live-feed-items');
    if (!container) return;
    // 添加新的一行到顶部
    const data = getData();
    const wfs = data.workflows.filter(w => w.status === 'active');
    if (wfs.length === 0) return;
    const user = LIVE_USERS[Math.floor(Math.random() * LIVE_USERS.length)];
    const wf = wfs[Math.floor(Math.random() * wfs.length)];
    const action = LIVE_ACTIONS[Math.floor(Math.random() * LIVE_ACTIONS.length)];
    const newItem = document.createElement('div');
    newItem.className = 'live-feed-item';
    newItem.innerHTML = `<strong>${user}</strong> ${action} <span class="wf-name">${escapeHtml(wf.name)}</span> · 刚刚`;
    newItem.style.cssText = 'opacity: 0; transition: opacity 0.5s';
    container.insertBefore(newItem, container.firstChild);
    setTimeout(() => newItem.style.opacity = '1', 50);
    // 移除底部多余项
    while (container.children.length > 12) {
      container.removeChild(container.lastChild);
    }
    // 平移动画
    container.style.transform = 'translateY(-18px)';
    setTimeout(() => {
      container.style.transition = 'none';
      container.style.transform = 'translateY(0)';
      container.removeChild(container.firstChild);
      setTimeout(() => {
        container.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)';
      }, 50);
    }, 500);
  }, 3000);
}

function renderGallerySlides(wf) {
  const slides = getGallerySlides(wf);
  return slides.map((s, i) => `
    <div class="gallery-slide ${i === 0 ? 'active' : ''}" data-slide="${i}">
      <div class="gallery-image">${s.svg}</div>
      <div class="gallery-caption">
        <div class="gallery-caption-label">${s.label}</div>
        <div class="gallery-caption-title">${s.title}</div>
      </div>
    </div>
  `).join('');
}

function renderGalleryDots(wf) {
  const slides = getGallerySlides(wf);
  return slides.map((_, i) => `
    <span class="gallery-dot ${i === 0 ? 'active' : ''}" data-dot="${i}" onclick="galleryGoTo('${wf.id}', ${i})"></span>
  `).join('');
}

function renderGalleryThumbs(wf) {
  const slides = getGallerySlides(wf);
  return slides.map((s, i) => `
    <div class="gallery-thumb ${i === 0 ? 'active' : ''}" data-thumb="${i}" onclick="galleryGoTo('${wf.id}', ${i})">
      <div class="gallery-thumb-img">${s.svg}</div>
      <div class="gallery-thumb-label">${s.shortLabel || s.label.split(' · ')[0]}</div>
    </div>
  `).join('');
}

function galleryNav(wfId, dir) {
  const gallery = document.getElementById('gallery-' + wfId);
  if (!gallery) return;
  const slides = gallery.querySelectorAll('.gallery-slide');
  let current = 0;
  slides.forEach((s, i) => { if (s.classList.contains('active')) current = i; });
  const next = (current + dir + slides.length) % slides.length;
  galleryGoTo(wfId, next);
}

function galleryGoTo(wfId, idx) {
  const gallery = document.getElementById('gallery-' + wfId);
  if (!gallery) return;
  gallery.querySelectorAll('.gallery-slide').forEach((s, i) => s.classList.toggle('active', i === idx));
  gallery.querySelectorAll('.gallery-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  gallery.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
}

function renderSearch() {
  const data = getData();
  const active = Array.isArray(data.workflows)

  if (!active) {
    state.searchError = '数据结构异常: workflows 不是可搜索列表。';
  }

  const base = active || [];
  const results = state.searchError ? [] : filterWorkflowsForSearch(base)
    .map(w => ({ ...w, _clicks: getClickCount(w.id) }))
    .sort((a, b) => {
      if (isPromotedWorkflow(a) !== isPromotedWorkflow(b)) return isPromotedWorkflow(b) - isPromotedWorkflow(a);
      return (b._clicks || 0) - (a._clicks || 0);
    });
  const typeOptions = getSearchTypeOptions(base);
  const queryText = state.searchQuery ? `「${escapeHtml(state.searchQuery)}」` : '全部工具';

  document.getElementById('view-search').innerHTML = `
    ${renderNav()}
    <div class="container search-page">
      <section class="search-hero">

          <h1>搜索 AI 工作流与外部工具</h1>
          <p>输入任务、平台或工具名称,快速找到站内可用工作流、合作伙伴工具和广告推广资源。</p>
        </div>
        <div class="search-hero-count">
          <strong>${base.length}</strong>
          <span>可搜索资源</span>
        </div>
      </section>

      <div class="search-shell">
        <aside class="search-panel">
          <div class="search-panel-title">Search</div>
          <div class="search-page-box">
            <i class="fas fa-search"></i>
            <input id="search-page-input" type="text" placeholder="例如: 小红书、商品图、代码 Review" value="${escapeHtml(state.searchQuery)}" />
          </div>

          <div class="search-filter-block">
            <div class="search-filter-title">分类</div>
            <div class="search-filter-list">
              ${CATEGORIES.map(c => {
                const count = c === '全部' ? base.length : base.filter(w => w.category === c).length;
                return `
                  <button class="search-filter-item ${state.searchCategory === c ? 'active' : ''}" onclick="setSearchCategory('${c}')">
                    <span>${c}</span>
                    <span class="filter-count">${count}</span>
                  </button>
                `;
              }).join('')}
            </div>
          </div>

          <div class="search-filter-block">
            <div class="search-filter-title">类型</div>
            <div class="search-filter-list">
              ${typeOptions.map(t => `
                <button class="search-filter-item ${state.searchType === t.id ? 'active' : ''}" onclick="setSearchType('${t.id}')">
                  <span>${t.label}</span>
                  <span class="filter-count">${t.count}</span>
                </button>
              `).join('')}
            </div>
          </div>

          <button class="search-clear-btn" onclick="clearSearchFilters()">清空筛选</button>
        </aside>

        <main>
          <div class="search-results-head">
            <h2>${queryText} 的搜索结果</h2>
            <span>${state.searchCategory} · ${typeOptions.find(t => t.id === state.searchType)?.label || '全部类型'} · ${results.length} 个结果</span>
          </div>
          ${state.searchLoading
            ? renderSearchState('loading')
            : state.searchError
              ? renderSearchState('error')
              : results.length === 0
                ? renderSearchState('empty')
                : `<div class="search-result-grid">${results.map(renderSearchResultCard).join('')}</div>`}
        </main>
      </div>
      ${renderFooter()}
    </div>
  `;
}

function toggleNotifPanel(e) {
  e.stopPropagation();

function readNotif(id) {
  const data = getData();
  if (data._notifs) {
    const n = data._notifs.find(x => x.id === id);
    if (n) n.read = true;
    saveData(data);
    render();
  }
}

function markAllRead(e) {
  e.stopPropagation();
  const data = getData();
  if (data._notifs) {
    data._notifs.forEach(n => n.read = true);
    saveData(data);
    showToast('全部标为已读');
    render();
  }
}

function renderInlineRunner(wf) {
  if (!isInlineRunnerWorkflow(wf)) return '';
  if (wf.id === 'wf_seed_image_video') return renderImageVideoRunner(wf);
  if (wf.id === 'wf_seed_sql') return renderSqlRunner(wf);
  return '';
}

function renderRun() {
  const data = getData();
  const runId = state.currentRunId || localStorage.getItem('flowhub_current_run');
  const wf = data.workflows.find(w => w.id === runId);
  if (wf) {
    state.currentRunId = wf.id;
    state.currentDetailId = wf.id;
  }
  const view = document.getElementById('view-run');
  if (!wf || !isInlineRunnerWorkflow(wf)) {
    view.innerHTML = `
      <div class="run-page">
        <div class="run-topbar">
          <div class="run-left">
            <button class="run-back" onclick="switchView('market')" title="返回市场">←</button>
            <div class="run-title">
              <h1>工作流不存在</h1>
              <p>请返回市场重新选择一个自营工作流</p>
            </div>
          </div>
        </div>
      </div>
    `;
    document.title = '运行工作流 · FlowHub';
    return;
  }

  document.title = wf.name + ' · 运行中';
  const isImageVideoRun = wf.id === 'wf_seed_image_video';
  const topbarActions = isImageVideoRun ? `
          <button class="run-action-btn icon-only" onclick="undoIvCanvas('${wf.id}')" title="撤销">↶</button>
          <button class="run-action-btn icon-only" onclick="redoIvCanvas('${wf.id}')" title="重做">↷</button>
          <button class="run-action-btn" onclick="runIvWorkflow('${wf.id}')">▶ 运行</button>
          <button class="run-action-btn" onclick="saveIvProject('${wf.id}')"><i class="fas fa-cloud-arrow-up"></i> 保存</button>
          <button class="run-action-btn" onclick="exportIvProject('${wf.id}')"><i class="fas fa-download"></i> 导出</button>
          <button class="run-action-btn" onclick="openIvProjectImport('${wf.id}')"><i class="fas fa-file-import"></i> 导入</button>
          <button class="run-action-btn" id="iv-guide-top-${wf.id}" onclick="toggleIvGuide('${wf.id}')"><i class="fas fa-circle-info"></i> 功能说明</button>
          <button class="run-action-btn" onclick="shareIvWorkflow('${wf.id}')">⇧ 分享</button>
          <button class="run-action-btn" onclick="favoriteIvWorkflow('${wf.id}')">☆ 收藏</button>
  ` : `
          <button class="run-action-btn" onclick="shareIvWorkflow('${wf.id}')">⇧ 分享</button>
          <button class="run-action-btn" onclick="favoriteIvWorkflow('${wf.id}')">☆ 收藏</button>
  `;
  view.innerHTML = `
    <div class="run-page">
      <div class="run-topbar">
        <div class="run-left">
          <button class="run-back" onclick="goToDetail('${wf.id}')" title="返回详情">←</button>
          <div class="run-title">
            <h1>${escapeHtml(wf.name)}</h1>
            <p>${escapeHtml(wf.tagline || '沉浸式自营工作流')}</p>
          </div>
        </div>
        <div class="run-topbar-center">
          ${topbarActions}
        </div>
        <div class="run-right">
          <span class="run-status"><span class="dot"></span>${wf.price_model === 'free' ? '免费试用' : 'Pro 工作流'}</span>
          ${isImageVideoRun ? `<span class="run-status" id="iv-save-status-${wf.id}"><i class="fas fa-check-circle"></i> 已保存</span>` : ''}
          <span class="run-status"><i class="fas fa-bolt"></i>${getClickCount(wf.id).toLocaleString()} 次运行</span>
          ${isImageVideoRun ? `<button class="run-publish-btn" onclick="publishIvWorkflow('${wf.id}')">发布工作流</button>` : ''}
        </div>
      </div>
      <div class="run-workspace">
        ${renderInlineRunner(wf)}
      </div>
    </div>
  `;
  if (wf.id === 'wf_seed_image_video') {
    setTimeout(() => {
      renderImageVideoCanvas(wf.id);
      renderImageVideoAssets(wf.id);
      syncIvCanvasControls(wf.id);
    }, 0);
  }
}

function switchIvAssistantTab(wfId, tab) {
  const chat = document.getElementById('iv-chat-' + wfId);
  const guide = document.getElementById('iv-guide-panel-' + wfId);
  const chatTab = document.getElementById('iv-tab-chat-' + wfId);
  const guideTab = document.getElementById('iv-tab-guide-' + wfId);
  if (!chat || !guide) return;
  const showGuide = tab === 'guide';
  chat.style.display = showGuide ? 'none' : 'flex';
  guide.classList.toggle('show', showGuide);
  if (chatTab) chatTab.classList.toggle('active', !showGuide);
  if (guideTab) guideTab.classList.toggle('active', showGuide);
}

function toggleIvGuide(wfId) {
  const studio = document.getElementById('iv-studio-' + wfId);
  if (!studio) return;
  const show = !studio.classList.contains('guide-on');
  studio.classList.toggle('guide-on', show);
  const topBtn = document.getElementById('iv-guide-top-' + wfId);
  if (topBtn) topBtn.classList.toggle('active', show);
  switchIvAssistantTab(wfId, show ? 'guide' : 'chat');
  showToast(show ? '已打开功能说明' : '已关闭功能说明');
}

function closeIvGuide(wfId) {
  const studio = document.getElementById('iv-studio-' + wfId);
  if (studio) studio.classList.remove('guide-on');
  const topBtn = document.getElementById('iv-guide-top-' + wfId);
  if (topBtn) topBtn.classList.remove('active');
  switchIvAssistantTab(wfId, 'chat');
  showToast('已关闭功能说明');
}

function renderRelatedWorkflows(currentWf) {
  const data = getData();
  // 相关:同分类的 / 同标签的,排除自己
  const related = data.workflows
    .filter(w => w.id !== currentWf.id && w.status === 'active')
    .map(w => {
      let score = 0;
      if (w.category === currentWf.category) score += 10;
      if (w.type === currentWf.type) score += 3;
      // 标签匹配
      if (w.tags && currentWf.tags) {
        const overlap = w.tags.filter(t => currentWf.tags.includes(t)).length;
        score += overlap * 5;
      }
      // 评分加成
      score += w.rating;
      return { ...w, _score: score };
    })
    .sort((a, b) => b._score - a._score)
    .slice(0, 4);

  if (related.length === 0) return '';

  return `
    <section class="related-section">
      <div class="section-head">
        <span class="sec-tag" style="background:var(--bg-soft);color:var(--ink-2)"><i class="fas fa-link" style="font-size:9px"></i> 相关</span>
        <h2>看了这个工作流的人,也在用</h2>
      </div>
      <div class="wf-grid wf-grid-full">
        ${related.map(renderWfCard).join('')}
      </div>
    </section>
  `;
}

function submitReview(wfId) {
  const data = getData();
  const rating = parseInt(document.getElementById('rv-rating').value);
  const text = document.getElementById('rv-text').value.trim();
  if (!text) return showToast('请填写评价内容', true);

  const reviewObj = {
    id: 'rv_' + Date.now(),
    workflow_id: wfId,
    user_name: data.user.name,
    avatar: data.user.name.charAt(0),
    rating: rating,
    text: text,
    date: '刚刚'
  };
  data.reviews.unshift(reviewObj);
  const wf = data.workflows.find(w => w.id === wfId);
  if (wf) {
    const newCount = wf.review_count + 1;
    wf.rating = ((wf.rating * wf.review_count + rating) / newCount).toFixed(1) * 1;
    wf.review_count = newCount;
  }
  saveData(data);
  if (_apiLoaded) {
    delete _reviewsCache[wfId];
    apiPost('/workflows/' + wfId + '/reviews', {
      user_name: reviewObj.user_name,
      avatar: reviewObj.avatar,
      rating: rating,
      text: text
    });
  }
  closeModal();
  showToast('评价已发布');
  renderDetail();
}

let _codeTimer = null;
async function sendEmailCode() {
  const email = document.getElementById('auth-email').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    return showToast('请输入正确的邮箱地址', true);
  }
  const btn = document.getElementById('auth-sms-btn');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '发送中…';
  btn.style.opacity = '0.6';

  try {
    const resp = await fetch(API_BASE + '/auth/send-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const result = await resp.json();
    if (!resp.ok) {
      btn.disabled = false;
      btn.textContent = '获取验证码';
      btn.style.opacity = '1';
      return showToast(result.error?.message || '发送失败', true);
    }
    showToast('验证码已发送到邮箱');
    let sec = 60;
    btn.textContent = `${sec}s`;
    _codeTimer = setInterval(() => {
      sec--;
      if (sec <= 0) {
        clearInterval(_codeTimer);
        btn.disabled = false;
        btn.textContent = '获取验证码';
        btn.style.opacity = '1';
      } else {
        btn.textContent = `${sec}s`;
      }
    }, 1000);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '获取验证码';
    btn.style.opacity = '1';
    showToast('网络错误，请稍后重试', true);
  }
}

async function doAuth(type) {
  const email = document.getElementById('auth-email').value.trim();
  const code = document.getElementById('auth-code').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showToast('请输入正确的邮箱地址', true);
  if (!code || code.length !== 6) return showToast('请输入 6 位验证码', true);

  const name = type === 'register'
    ? (document.getElementById('auth-name').value.trim() || '新用户')
    : undefined;

  const btn = document.querySelector('.auth-submit-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 处理中…'; }

  if (_apiLoaded) {
    try {
      const endpoint = type === 'register' ? '/auth/register' : '/auth/login';
      const body = type === 'register' ? { email, code, name } : { email, code };
      const resp = await fetch(API_BASE + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const result = await resp.json();

      if (!resp.ok) {
        if (btn) { btn.disabled = false; btn.innerHTML = type === 'login' ? '登录' : '注册并登录'; }
        if (result.error?.code === 'USER_NOT_FOUND') return showToast('该邮箱未注册，请先注册', true);
        if (result.error?.code === 'USER_EXISTS') return showToast('该邮箱已注册，请直接登录', true);
        return showToast(result.error?.message || '操作失败', true);
      }

      localStorage.setItem('flowhub_token', result.data.token);
      const data = getData();
      data.user = result.data.user;
      saveData(data);
      closeModal();
      render();
      updateUserStatus();
      if (result.data.user.role === 'admin') loadAdminDataAsync().then(render);
      setTimeout(() => showWelcomePop(result.data.user.name, type === 'register'), 400);
      return;
    } catch (e) {
      console.warn('API auth failed, falling back to local:', e.message);
    }
  }

  const data = getData();
  data.user = {
    id: 'u_' + email.replace(/[@.]/g, '_'),
    email: email,
    name: name || ('用户' + email.split('@')[0].slice(-4)),
    tier: 'free',
    role: 'user',
    created_at: new Date().toISOString()
  };
  saveData(data);
  closeModal();
  render();
  updateUserStatus();
  setTimeout(() => showWelcomePop(data.user.name, type === 'register'), 400);
}

async function restoreSession() {
  const token = localStorage.getItem('flowhub_token');
  if (!token || !_apiLoaded) return;
  try {
    const resp = await fetch(API_BASE + '/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!resp.ok) { localStorage.removeItem('flowhub_token'); return; }
    const result = await resp.json();
    if (result.ok && result.data.user) {
      const data = getData();
      data.user = result.data.user;
      saveData(data);
      render();
      updateUserStatus();
      if (result.data.user.role === 'admin') loadAdminDataAsync().then(render);
    }
  } catch (e) {
    console.warn('Session restore failed:', e.message);
  }
}

function timeAgo(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  if (ms < 60000) return '刚刚';
  if (ms < 3600000) return Math.floor(ms / 60000) + ' 分钟前';
  if (ms < 86400000) return Math.floor(ms / 3600000) + ' 小时前';
  return Math.floor(ms / 86400000) + ' 天前';
}

function getAdminClickStats(data) {
  const activeWfs = data.workflows.filter(w => w.status === 'active');
  const total = activeWfs.reduce((sum, w) => sum + getClickCount(w.id), 0);
  const last7 = activeWfs.reduce((sum, w) => sum + getClickCountInDays(w.id, 7), 0);
  const todayStart = new Date();
  todayStart.setHours(0, 0, 0, 0);
  const today = data.clicks.filter(c => new Date(c.clicked_at).getTime() >= todayStart.getTime()).length;
  return { total, today, last7 };
}

function getSearchTermRanking(data) {
  const map = new Map();
  data.clicks.forEach(c => {
    const q = (c.search_query || '').trim();
    if (!q) return;
    map.set(q, (map.get(q) || 0) + 1);
  });
  const rows = Array.from(map.entries())
    .map(([name, clicks]) => ({ name, sub: 'search_query', clicks }))
    .sort((a, b) => b.clicks - a.clicks)
    .slice(0, 6);
  if (rows.length) return rows;
  return ['商品图', 'SQL', '小红书', '翻译', '简历', '海报'].map((name, i) => ({
    name,
    sub: '等待真实搜索点击',
    clicks: i === 0 ? '—' : '—'
  }));
}

function getWorkflowClickRanking(data, onlyExternal) {
  return data.workflows
    .filter(w => w.status === 'active' && (!onlyExternal || w.type === 'recommend'))
    .map(w => ({
      id: w.id,
      name: w.name,
      sub: onlyExternal ? shortUrl(w.target_url || '') : w.category,
      clicks: getClickCount(w.id)
    }))
    .sort((a, b) => b.clicks - a.clicks)
    .slice(0, 6);
}

function renderMiniChart(values, color, width) {
  const w = width || 140;
  const h = 40;
  const max = Math.max(...values);
  const min = Math.min(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 6) - 3;
    return `${x},${y}`;
  }).join(' ');
  const area = `M 0,${h} L ${pts.split(' ').join(' L ')} L ${w},${h} Z`;
  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;display:block">
      <defs>
        <linearGradient id="mg-${color.replace('#','')}-${w}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${area}" fill="url(#mg-${color.replace('#','')}-${w})"/>
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${w}" cy="${h - ((values[values.length-1] - min) / range) * (h - 6) - 3}" r="2.5" fill="${color}"/>
    </svg>
  `;
}

function renderTrendChart() {
  const data = getData();
  // 生成 30 天数据
  const days = 30;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const selfData = [];
  const adData = [];
  for (let i = days - 1; i >= 0; i--) {
    const day = today.getTime() - i * 86400000;
    const dayEnd = day + 86400000;
    let selfDay = 0, adDay = 0;
    data.clicks.forEach(c => {
      const t = new Date(c.clicked_at).getTime();
      if (t >= day && t < dayEnd) {
        const wf = data.workflows.find(w => w.id === c.workflow_id);
        if (wf?.type === 'self') selfDay++; else adDay++;
      }
    });
    // 加点模拟基数
    selfData.push(selfDay + Math.floor(80 + i * 4 + Math.random() * 30));
    adData.push(adDay + Math.floor(40 + i * 1.5 + Math.random() * 20));
  }

  const w = 900, h = 220;
  const maxVal = Math.max(...selfData, ...adData);
  const pts = (arr) => arr.map((v, i) => `${i * (w / (days - 1))},${h - (v / maxVal) * (h - 30) - 10}`).join(' ');
  const area = (arr) => `M ${pts(arr).split(' ')[0]} L ${pts(arr).split(' ').slice(1).join(' L ')} L ${w},${h} L 0,${h} Z`;

  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:200px">
      <line x1="0" y1="40" x2="${w}" y2="40" stroke="#EFEEE9" stroke-width="1"/>
      <line x1="0" y1="110" x2="${w}" y2="110" stroke="#EFEEE9" stroke-width="1"/>
      <line x1="0" y1="180" x2="${w}" y2="180" stroke="#EFEEE9" stroke-width="1"/>
      <path d="${area(selfData)}" fill="#1A5D3A" fill-opacity="0.1"/>
      <polyline points="${pts(selfData)}" fill="none" stroke="#1A5D3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="${pts(adData)}" fill="none" stroke="#B85C00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${(days - 1) * (w / (days - 1))}" cy="${h - (selfData[days - 1] / maxVal) * (h - 30) - 10}" r="4" fill="#1A5D3A"/>
      <circle cx="${(days - 1) * (w / (days - 1))}" cy="${h - (adData[days - 1] / maxVal) * (h - 30) - 10}" r="4" fill="#B85C00"/>
    </svg>
  `;
}
