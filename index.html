<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowHub · 工作流市场</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #FAFAF7;
    --bg-elev: #FFFFFF;
    --bg-soft: #F2F1ED;
    --ink: #0F0F0E;
    --ink-2: #3A3935;
    --ink-3: #6B6963;
    --ink-4: #A5A39C;
    --line: rgba(15, 15, 14, 0.08);
    --line-strong: rgba(15, 15, 14, 0.15);
    --self: #1A5D3A;
    --self-bg: #E3F0E8;
    --self-soft: #F0F7F3;
    --ad: #B85C00;
    --ad-bg: #FDEDD8;
    --ad-soft: #FBF6EC;
    --pro: #5B3FA8;
    --pro-bg: #ECE5FA;
    --danger: #B83838;
    --warn: #B47B00;
    --info: #1E3A8A;
    --info-bg: #E8EDFA;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
  }
  [data-theme="dark"] {
    --bg: #0E0E0D;
    --bg-elev: #1A1A18;
    --bg-soft: #242422;
    --ink: #FAFAF7;
    --ink-2: #D8D7D2;
    --ink-3: #A0A09A;
    --ink-4: #6F6E6A;
    --line: rgba(255, 255, 255, 0.1);
    --line-strong: rgba(255, 255, 255, 0.18);
    --self: #5DCAA5;
    --self-bg: rgba(93, 202, 165, 0.16);
    --self-soft: rgba(93, 202, 165, 0.08);
    --ad: #F2A623;
    --ad-bg: rgba(242, 166, 35, 0.16);
    --ad-soft: rgba(242, 166, 35, 0.08);
    --pro: #AFA9EC;
    --pro-bg: rgba(175, 169, 236, 0.16);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', -apple-system, 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* ====================== Hero 大卡(本周精选) ====================== */
  .featured-hero {
    background: linear-gradient(135deg, #0F0F0E 0%, #2A2A28 100%);
    color: #FAFAF7;
    border-radius: var(--radius-xl);
    padding: 36px 40px;
    margin-bottom: 18px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    align-items: center;
    cursor: pointer;
    position: relative;
    overflow: visible;
    transition: transform 0.3s ease;
  }
  .featured-hero:hover { transform: translateY(-2px); }
  .featured-hero::before {
    content: '';
    position: absolute;
    top: -40%; right: -10%;
    width: 60%; height: 180%;
    background: radial-gradient(circle, rgba(255,214,165,0.12) 0%, transparent 60%);
    pointer-events: none;
    clip-path: inset(0 0 0 0 round var(--radius-xl));
  }
  .featured-hero .fh-eyebrow {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.55;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 14px;
  }
  .featured-hero h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 38px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
  }
  .featured-hero p {
    font-size: 14px;
    opacity: 0.7;
    line-height: 1.6;
    max-width: 460px;
    margin-bottom: 22px;
    position: relative;
    z-index: 1;
  }
  .featured-hero .fh-meta {
    display: flex;
    gap: 22px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.7;
    position: relative;
    z-index: 1;
  }
  .featured-hero .fh-meta i { color: #FFD6A5; font-size: 11px; }
  .featured-hero .fh-thumb {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-lg);
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }
  .featured-hero .fh-thumb svg { width: 60%; height: auto; opacity: 0.7; }

  /* ====================== 缩略图占位 ====================== */
  .wf-thumb {
    aspect-ratio: 16/10;
    background: linear-gradient(135deg, var(--bg-soft), var(--bg));
    border-radius: 8px;
    margin: -4px -4px 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .wf-thumb svg { width: 60%; height: auto; opacity: 0.85; }
  .wf-thumb-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.15));
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .wf-card:hover .wf-thumb-overlay { opacity: 1; }

  /* ====================== 在线试用面板(详情页) ====================== */
  .try-panel {
    margin-top: 12px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .try-panel-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
  }
  .try-panel-head .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    background: var(--self-bg);
    color: var(--self);
    border-radius: 4px;
    font-weight: 600;
  }
  .try-body { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .try-side h5 {
    font-size: 11px;
    color: var(--ink-3);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .try-input, .try-output {
    background: var(--bg-soft);
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink-2);
    min-height: 120px;
    white-space: pre-wrap;
    font-family: inherit;
  }
  .try-output { position: relative; }
  .try-output.loading::before {
    content: '⚡ 生成中…';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--ink-3);
    font-family: 'JetBrains Mono', monospace;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  .try-actions {
    margin-top: 10px;
    display: flex;
    gap: 6px;
  }
  .try-btn {
    padding: 6px 12px;
    border: 1px solid var(--line-strong);
    background: var(--bg-elev);
    border-radius: 6px;
    font-size: 11px;
    color: var(--ink-2);
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .try-btn:hover { background: var(--bg-soft); }
  .try-btn.primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  /* ====================== 通知红点 ====================== */
  .notification-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #FF4D4D;
    border-radius: 50%;
    margin-left: auto;
    animation: pulse-dot 1.6s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.6; }
  }

  /* ====================== 数字滚动动画 ====================== */
  @keyframes numFlash {
    0% { background: var(--self-bg); transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { background: transparent; transform: scale(1); }
  }
  .num-flash {
    animation: numFlash 0.8s ease;
  }

  /* ====================== 主题切换按钮 ====================== */
  .theme-toggle {
    background: rgba(255,255,255,0.08);
    border: none;
    color: var(--bg);
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }
  .theme-toggle:hover { background: rgba(255,255,255,0.15); }

  /* 适配暗色 */
  [data-theme="dark"] .featured-hero {
    background: linear-gradient(135deg, #3A3935 0%, #242422 100%);
    border: 1px solid rgba(255,255,255,0.1);
  }
  [data-theme="dark"] .wf-thumb {
    background: linear-gradient(135deg, #242422, #1A1A18);
  }
  [data-theme="dark"] .try-panel-head { background: var(--bg-soft); }
  [data-theme="dark"] .featured-hero::before {
    background: radial-gradient(circle, rgba(255,214,165,0.18) 0%, transparent 60%);
  }
  [data-theme="dark"] .demo-bar {
    background: #050504;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  [data-theme="dark"] .demo-pill.active {
    background: var(--ink);
    color: #0E0E0D;
  }
  [data-theme="dark"] .creator-hero {
    background: linear-gradient(135deg, #3A3935, #1A1A18);
  }
  [data-theme="dark"] .footer-logo {
    background: var(--ink);
    color: #0E0E0D;
  }
  [data-theme="dark"] .logo .mark {
    background: var(--ink);
    color: #0E0E0D;
  }
  [data-theme="dark"] .skeleton {
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200px 100%;
  }
  [data-theme="dark"] .pricing-card.featured {
    background: #2A2A28;
  }
  [data-theme="dark"] .pricing-card.featured .pricing-cta {
    background: #FFD6A5;
    color: #0E0E0D;
    border-color: #FFD6A5;
  }
  [data-theme="dark"] .btn-pro {
    background: linear-gradient(95deg, #3A3935, #2A2A28);
  }
  [data-theme="dark"] .hero h1 .accent { color: var(--self); }
  [data-theme="dark"] .lock-banner {
    background: linear-gradient(135deg, rgba(255,247,232,0.1), rgba(253,237,216,0.05));
    border-color: rgba(240,178,96,0.4);
    color: #FFD6A5;
  }
  [data-theme="dark"] .code-block { background: #050504; }
  [data-theme="dark"] .redirect-card { background: var(--bg-elev); border: 1px solid var(--line); }
  [data-theme="dark"] .redirect-card h3 { color: var(--ink); }
  [data-theme="dark"] .redirect-go { background: var(--ink); color: var(--bg); }
  [data-theme="dark"] .redirect-cancel { background: var(--bg-soft); border-color: var(--line); color: var(--ink-2); }
  [data-theme="dark"] .redirect-overlay { background: rgba(0,0,0,0.7); }
  [data-theme="dark"] .theme-toggle { border-color: var(--line); color: var(--ink-2); }
  [data-theme="dark"] .auth-code-btn { background: var(--bg-soft); color: var(--ink-2); border-color: var(--line); }

  /* ====================== 全局微交互打磨 ====================== */
  /* 全局按钮按下效果 */
  button, .demo-pill, .cat-pill, .hot-tag, .wf-card, .rank-item {
    -webkit-tap-highlight-color: transparent;
  }
  button:active, .demo-pill:active, .cat-pill:active {
    transform: scale(0.97);
  }
  /* 卡片精致 hover */
  .wf-card {
    transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1),
                box-shadow 0.25s ease,
                border-color 0.2s ease;
  }
  .wf-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(15,15,14,0.08);
    border-color: var(--line-strong);
  }
  .wf-card:active {
    transform: translateY(-1px);
  }
  /* Hero 大卡 hover */
  .featured-hero {
    transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1),
                box-shadow 0.3s ease;
  }
  .featured-hero:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 36px rgba(15,15,14,0.18);
  }
  /* 主按钮 hover */
  .btn-primary {
    transition: all 0.18s ease;
    position: relative;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(15,15,14,0.18);
  }
  /* Pro 升级按钮 */
  .btn-pro {
    transition: all 0.2s ease;
    box-shadow: 0 2px 8px rgba(255, 214, 165, 0.2);
  }
  .btn-pro:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(255, 214, 165, 0.35);
  }
  /* CTA 大按钮 */
  .side-cta {
    transition: all 0.2s ease;
  }
  .side-cta:hover:not(.outline):not(:disabled) {
    background: #2A2A28;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(15,15,14,0.15);
  }
  .side-cta.outline:hover {
    background: var(--bg-soft);
  }
  /* 通用 fade-in 加载 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in-up {
    animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  /* 卡片错峰进入动画 */
  .wf-grid .wf-card {
    animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  .wf-grid .wf-card:nth-child(1) { animation-delay: 0.02s; }
  .wf-grid .wf-card:nth-child(2) { animation-delay: 0.06s; }
  .wf-grid .wf-card:nth-child(3) { animation-delay: 0.1s; }
  .wf-grid .wf-card:nth-child(4) { animation-delay: 0.14s; }
  .wf-grid .wf-card:nth-child(5) { animation-delay: 0.18s; }
  .wf-grid .wf-card:nth-child(6) { animation-delay: 0.22s; }
  .wf-grid .wf-card:nth-child(7) { animation-delay: 0.26s; }
  .wf-grid .wf-card:nth-child(8) { animation-delay: 0.3s; }

  /* 输入框焦点反馈 */
  input:focus, textarea:focus, select:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(15,15,14,0.06);
  }

  /* ====================== 移动端 Tab 栏 ====================== */
  .mobile-tabbar {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-elev);
    border-top: 1px solid var(--line);
    z-index: 950;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .mobile-tabbar-row {
    display: flex;
    justify-content: space-around;
    align-items: center;
  }
  .mobile-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px;
    color: var(--ink-3);
    cursor: pointer;
    font-size: 11px;
    transition: color 0.15s;
  }
  .mobile-tab i {
    font-size: 16px;
    transition: transform 0.2s;
  }
  .mobile-tab.active {
    color: var(--ink);
  }
  .mobile-tab.active i {
    transform: scale(1.1);
  }
  .mobile-tab.center {
    flex: 0;
  }
  .mobile-tab.center .center-btn {
    width: 44px;
    height: 44px;
    background: var(--ink);
    color: var(--bg);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    margin-top: -10px;
    box-shadow: 0 4px 12px rgba(15,15,14,0.2);
  }
  .mobile-tab.center span { margin-top: 2px; }
  /* 移动端抽屉 */
  .mobile-drawer-bg {
    position: fixed;
    inset: 0;
    background: rgba(15,15,14,0.5);
    z-index: 1100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .mobile-drawer-bg.show {
    opacity: 1;
    pointer-events: auto;
  }
  .mobile-drawer {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 80%;
    max-width: 320px;
    background: var(--bg-elev);
    z-index: 1110;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    display: flex;
    flex-direction: column;
    padding: 20px;
    padding-top: max(20px, env(safe-area-inset-top));
  }
  .mobile-drawer.show { transform: translateX(0); }
  .mobile-drawer-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .mobile-drawer-section {
    font-size: 10px;
    color: var(--ink-3);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 14px 0 6px;
  }
  .mobile-drawer-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: var(--ink);
    transition: background 0.15s;
  }
  .mobile-drawer-item:hover { background: var(--bg-soft); }
  .mobile-drawer-item i { width: 18px; color: var(--ink-3); }
  .mobile-drawer-item.active { background: var(--bg-soft); }
  .mobile-drawer-item.active i { color: var(--ink); }

  .mobile-menu-trigger {
    display: none;
    background: none;
    border: none;
    width: 36px;
    height: 36px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 8px;
    color: var(--ink-2);
  }
  .mobile-menu-trigger:hover { background: var(--bg-soft); }
  .demo-bar {
    background: var(--ink);
    color: var(--bg);
    padding: 0;
    display: none;
    align-items: stretch;
    font-size: 11px;
    position: sticky;
    top: 0;
    z-index: 1000;
    overflow-x: auto;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    min-height: 42px;
  }
  .demo-bar::-webkit-scrollbar { display: none; }
  .demo-bar { scrollbar-width: none; }
  .demo-bar .label {
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.6;
    white-space: nowrap;
    font-size: 10px;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .demo-bar .demo-group {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.35;
    font-weight: 700;
    white-space: nowrap;
    padding: 0 10px 0 14px;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
  }
  .demo-pill {
    padding: 5px 11px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
    transition: all 0.15s;
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    align-self: center;
    margin: 6px 2px;
  }
  .demo-pill:hover { background: rgba(255,255,255,0.08); color: var(--bg); }
  .demo-pill.active { background: var(--bg); color: var(--ink); font-weight: 600; }
  .demo-bar .demo-divider {
    width: 1px;
    background: rgba(255,255,255,0.08);
    margin: 0 4px;
  }
  .demo-bar .spacer { flex: 1; min-width: 8px; }
  .demo-bar .right-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 0 12px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.75;
    border-left: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .reset-btn {
    background: rgba(255,255,255,0.06);
    border: none;
    color: var(--bg);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.15); }
  .theme-toggle {
    background: rgba(255,255,255,0.06);
    border: none;
    color: var(--bg);
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }
  .theme-toggle:hover { background: rgba(255,255,255,0.15); }

  /* ====================== AI 客服悬浮按钮 ====================== */
  .chatbot-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #5B3FA8, #3C3489);
    color: white;
    border-radius: 50%;
    display: flex;

  /* ====================== 骨架屏 ====================== */
  @keyframes skeleton {
    0% { background-position: -200px 0; }
    100% { background-position: calc(200px + 100%) 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, var(--bg-soft) 25%, var(--line) 50%, var(--bg-soft) 75%);

  .skeleton-card {

    border-radius: 14px;
    padding: 14px;
    min-height: 280px;

  .skeleton-line { height: 12px; border-radius: 4px; margin-bottom: 8px; }

  }

  .skeleton-card .skeleton-title { width: 70%; height: 16px; }
  .skeleton-card .skeleton-desc { width: 90%; height: 12px; }
  .skeleton-card .skeleton-tags { display: flex; gap: 6px; margin: 10px 0; }
  .skeleton-card .skeleton-tag { width: 50px; height: 20px; border-radius: 10px; }
  .skeleton-card .skeleton-foot { display: flex; justify-content: space-between; margin-top: auto; }
  .skeleton-card .skeleton-foot-l { width: 60px; height: 12px; }
  .skeleton-card .skeleton-foot-r { width: 45px; height: 12px; }

  /* ====================== 创作者申请 ====================== */
  .creator-type-btn {
    flex: 1; display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; border: 1.5px solid var(--line); border-radius: 12px;
    background: var(--bg); cursor: pointer; transition: all 0.2s; text-align: left;
  }
  .creator-type-btn:hover { border-color: var(--ink-3); }
  .creator-type-btn.active { border-color: var(--self); background: var(--self-soft); }
  .creator-type-btn i { font-size: 18px; flex-shrink: 0; }

  /* ====================== 跳转过渡 ====================== */
  .redirect-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .redirect-overlay.show { opacity: 1; }
  .redirect-card {
    background: var(--bg-elev); border-radius: 20px; padding: 40px 36px;
    text-align: center; max-width: 380px; width: 90%;

    transform: translateY(20px) scale(0.95); transition: transform 0.3s ease;
  }
  .redirect-overlay.show .redirect-card { transform: translateY(0) scale(1); }

  .redirect-host { font-size: 12px; color: var(--ink-3); font-family: 'JetBrains Mono', monospace; margin-bottom: 20px; }
  .redirect-countdown { margin: 0 auto 6px; }

  .redirect-ring svg { width: 100%; height: 100%; }
  .redirect-ring-fill { transition: stroke-dashoffset 0.8s ease; }
  .redirect-num {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--ink);
  }

  .redirect-actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
  .redirect-go {

  /* ====================== 创作者后台 ====================== */
  .creator-hero {

  .creator-earning-stat .l {

    opacity: 0.6;

  /* ====================== 视图切换 ====================== */
  .view { display: none; }

  /* ====================== 详情页大图轮播 ====================== */
  .gallery {
    margin-bottom: 28px;
  }
  .gallery-main {
    position: relative;
    aspect-ratio: 16 / 9;
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg-soft);
    margin-bottom: 12px;
  }
  .gallery-slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.4s ease;
    display: flex;
    flex-direction: column;
  }
  .gallery-slide.active {
    opacity: 1;
    z-index: 1;
  }
  .gallery-image {
    flex: 1;
    overflow: hidden;
  }
  .gallery-image svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .gallery-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.65));
    color: white;
    padding: 28px 24px 18px;
  }
  .gallery-caption-label {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 4px;
  }
  .gallery-caption-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 600;
  }
  .gallery-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    border: none;
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    z-index: 5;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .gallery-nav:hover {
    background: var(--ink);
    color: var(--bg);
    transform: translateY(-50%) scale(1.06);
  }
  .gallery-nav.prev { left: 14px; }
  .gallery-nav.next { right: 14px; }
  .gallery-dots {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 5;
  }
  .gallery-dot {
    width: 7px;
    height: 7px;
    background: rgba(255,255,255,0.45);
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.15s;
  }
  .gallery-dot.active {
    background: white;
    width: 22px;
    border-radius: 4px;
  }
  .gallery-thumbs {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 1fr;
    gap: 8px;
  }
  .gallery-thumb {
    cursor: pointer;
    border-radius: 8px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: all 0.15s;
    opacity: 0.7;
  }
  .gallery-thumb:hover { opacity: 1; }
  .gallery-thumb.active {
    border-color: var(--ink);
    opacity: 1;
  }
  .gallery-thumb-img {
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: var(--bg-soft);
  }
  .gallery-thumb-img svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .gallery-thumb-label {
    padding: 6px 8px;
    font-size: 10px;
    text-align: center;
    color: var(--ink-3);
    background: var(--bg-elev);
    font-family: 'JetBrains Mono', monospace;

  .gallery-thumb.active .gallery-thumb-label {
    color: var(--ink);
    font-weight: 600;
  }

  /* ====================== 详情页 ====================== */

  }
  .price-unit { font-size: 13px; color: var(--ink-3); }
  .price-hint {
    font-size: 12px;
    color: var(--ink-3);
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .side-cta {
    width: 100%;
    background: var(--ink);
    color: var(--bg);
    padding: 13px;
    border: none;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;

  .side-cta:disabled {

  .lock-banner {
    background: linear-gradient(135deg, #FFF7E8, #FDEDD8);

    align-items: center;
    gap: 10px;
    font-size: 12px;

  }
  .lock-banner i { font-size: 14px; }

  /* ====================== 调色卡片 ====================== */
  .tile-blue { background: #DCE6F5; color: #1E3A8A; }
  .tile-green { background: #DCEFE3; color: #1A5D3A; }
  .tile-orange { background: #FBE0C2; color: #B85C00; }
  .tile-purple { background: #E3D9F5; color: #5B3FA8; }
  .tile-pink { background: #F5D9E3; color: #B83A6B; }
  .tile-teal { background: #D9EEEC; color: #1F6B68; }
  .tile-amber { background: #FAE7C2; color: #8C6510; }
  .tile-gray { background: #E8E7E3; color: #444441; }

  /* ====================== Toast ====================== */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--ink);
    color: var(--bg);
    padding: 12px 20px;
    border-radius: 9px;
    font-size: 12px;
    font-weight: 500;
    z-index: 2000;
    transition: transform 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 32px rgba(15,15,14,0.2);
    max-width: 90vw;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast i { color: #5DCAA5; font-size: 12px; }
  .toast.err i { color: #FF8FAB; }

  /* ====================== 模态框 ====================== */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(15,15,14,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1500;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-elev);
    border-radius: var(--radius-lg);
    padding: 28px;
    max-width: 460px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal.wide { max-width: 640px; }
  .modal-close {
    position: absolute;
    top: 18px; right: 18px;
    width: 28px; height: 28px;
    background: var(--bg-soft);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-3);
  }
  .modal h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .modal .modal-sub {
    font-size: 13px;
    color: var(--ink-3);
    margin-bottom: 22px;
  }
  .field { margin-bottom: 14px; }

    color: var(--ink-2);

    color: var(--ink);
  }
  .modal-actions .primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);

  .pricing-cta {

  .stat-card .val.orange { color: var(--ad); }

  /* 表格 */
  .panel {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    margin-bottom: 24px;
    overflow: hidden;
  }
  .panel-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);

    align-items: center;
    justify-content: space-between;
  }

  /* 图表 */
  .chart-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 22px;
    margin-bottom: 24px;

  .chart-head {
    display: flex;
    align-items: center;
    justify-content: space-between;

function getData() {
  if (_apiCache) {
    const localUser = localStorage.getItem('flowhub_user');
    const localNotifs = localStorage.getItem('flowhub_notifs');
    const merged = Object.assign({}, _apiCache);
    if (localUser) merged.user = JSON.parse(localUser);
    if (localNotifs) merged._notifs = JSON.parse(localNotifs);
    return merged;
  }
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) {
    saveData(JSON.parse(JSON.stringify(SEED_DATA)));
    return JSON.parse(JSON.stringify(SEED_DATA));
  }
  try {
    return JSON.parse(raw);
  } catch {
    saveData(JSON.parse(JSON.stringify(SEED_DATA)));
    return JSON.parse(JSON.stringify(SEED_DATA));
  }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  if (data.user !== undefined) {
    localStorage.setItem('flowhub_user', JSON.stringify(data.user));
  }
  if (data._notifs !== undefined) {
    localStorage.setItem('flowhub_notifs', JSON.stringify(data._notifs));
  }
}

let _clickStats = null;
let _reviewsCache = {};

function authHeaders(extra) {
  const headers = Object.assign({}, extra || {});
  const token = localStorage.getItem('flowhub_token');
  if (token) headers.Authorization = 'Bearer ' + token;
  return headers;
}

function _parseWorkflow(w) {
  return {
    ...w,
    rating: parseFloat(w.rating) || 0,
    review_count: parseInt(w.review_count) || 0,
    seed_clicks: parseInt(w.seed_clicks) || 0,
    seed_clicks_7d: parseInt(w.seed_clicks_7d) || 0,
    price_amount: parseFloat(w.price_amount) || 0,
    examples: w.examples || []
  };
}

async function loadDataFromAPI() {
  try {
    const resp = await fetch(API_BASE + '/workflows?limit=100');
    const json = await resp.json();
    if (json.ok) {
      _apiCache = {
        workflows: json.data.workflows.map(_parseWorkflow),
        clicks: [],
        reviews: [],
        ad_applications: [],
        ad_slots: [],
        user: null,
        _notifs: null
      };
      _apiLoaded = true;
      console.log('[FlowHub] Workflows loaded:', _apiCache.workflows.length);
      loadClickStatsAsync();
      loadAdDataAsync();
    }
  } catch (err) {
    console.warn('[FlowHub] API unavailable, using localStorage fallback:', err.message);
    _apiCache = null;
  }
}

async function loadClickStatsAsync() {
  try {
    const resp = await fetch(API_BASE + '/clicks/stats');
    const json = await resp.json();
    if (json.ok) {
      _clickStats = json.data;
      console.log('[FlowHub] Click stats loaded');
    }
  } catch (err) {
    console.warn('[FlowHub] Click stats load failed:', err.message);
  }
}

async function loadAdDataAsync() {
  try {
    const [appsResp, slotsResp] = await Promise.all([
      fetch(API_BASE + '/ad-applications', { headers: authHeaders() }),
      fetch(API_BASE + '/ad-slots')
    ]);
    const [appsJson, slotsJson] = await Promise.all([appsResp.json(), slotsResp.json()]);
    if (appsJson.ok) _apiCache.ad_applications = appsJson.data.applications || [];
    if (slotsJson.ok) _apiCache.ad_slots = slotsJson.data.slots || [];
    console.log('[FlowHub] Ad data loaded');
  } catch (err) {
    console.warn('[FlowHub] Ad data load failed:', err.message);
  }
}

async function loadReviewsForWorkflow(wfId) {
  if (_reviewsCache[wfId]) return _reviewsCache[wfId];
  try {
    const resp = await fetch(API_BASE + '/workflows/' + wfId + '/reviews?limit=50');
    const json = await resp.json();
    if (json.ok) {
      _reviewsCache[wfId] = json.data.reviews || [];
      return _reviewsCache[wfId];
    }
  } catch (err) {
    console.warn('[FlowHub] Reviews load failed for', wfId, err.message);
  }
  const data = getData();
  return (data.reviews || []).filter(r => r.workflow_id === wfId);
}

async function apiPost(path, body) {
  try {
    const resp = await fetch(API_BASE + path, {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(body)
    });
    return await resp.json();
  } catch (err) {
    console.warn('[FlowHub] API POST failed:', path, err.message);
    return { ok: false };
  }
}

async function apiPatch(path, body) {
  try {
    const resp = await fetch(API_BASE + path, {
      method: 'PATCH',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(body)
    });
    return await resp.json();
  } catch (err) {
    console.warn('[FlowHub] API PATCH failed:', path, err.message);
    return { ok: false };
  }
}

function switchView(view, skipPush) {
  state.view = view;
  document.querySelectorAll('.demo-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.view === view);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });

  if (view !== 'detail') document.title = VIEW_TITLES[view] || 'FlowHub';

  if (!skipPush) {
    const path = view === 'market' ? '/' : '/' + view;
    history.pushState({ view }, '', path);
  }
}

  if (e.state && e.state.view) {
    switchView(e.state.view, true);
  } else {
    switchView('market', true);

});

(function initRoute() {
  const path = location.pathname.replace(/^\//, '') || 'market';
  const validViews = ['market', 'me', 'admin', 'creator', 'advertiser', 'wizard', 'detail'];
  const initialView = validViews.includes(path) ? path : 'market';
  history.replaceState({ view: initialView }, '', location.pathname);
  if (initialView !== 'market') {
    setTimeout(() => switchView(initialView, true), 0);
  }
})();

function formatPrice(wf, isAdmin) {
  if (isAdmin) {
    if (wf.price_model === 'free') return '免费';
    if (wf.price_model === 'pro') return 'Pro 会员';
    if (wf.price_model === 'cpc') return `CPC ¥${wf.price_amount}`;
    if (wf.price_model === 'cps') return `CPS ${wf.price_amount}%`;
    return '-';
  }
  if (wf.type === 'recommend') return '免费';
  if (wf.price_model === 'free') return '免费';
  if (wf.price_model === 'pro') return '会员专享';
  return '免费';
}

function priceClass(wf) {
  if (wf.price_model === 'free') return 'free';
  if (wf.price_model === 'pro') return 'pro';
  return '';
}

function shortUrl(url) {
  try {
    const u = new URL(url);
    return u.hostname + (u.pathname !== '/' ? u.pathname : '');
  } catch {
    return url.slice(0, 32);
  }
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function stars(rating) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.5;
  let html = '';
  for (let i = 0; i < full; i++) html += '<i class="fas fa-star"></i>';
  if (half) html += '<i class="fas fa-star-half-stroke"></i>';
  const empty = 5 - full - (half ? 1 : 0);
  for (let i = 0; i < empty; i++) html += '<i class="far fa-star"></i>';
  return html;
}

function showToast(msg, err) {
  const toast = document.getElementById('toast');
  const icon = toast.querySelector('i');
  document.getElementById('toast-msg').textContent = msg;
  toast.classList.toggle('err', !!err);
  icon.className = err ? 'fas fa-circle-exclamation' : 'fas fa-circle-check';
  toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').classList.add('show');

function closeModal() {

function runWorkflow(wfId) {
  const data = getData();
  const wf = data.workflows.find(w => w.id === wfId);
  if (!wf) return;

  // 权限校验:自营 + Pro 工作流需要 Pro 会员
  if (wf.type === 'self' && wf.price_model === 'pro') {
    if (!data.user) {
      showToast('请先登录', true);
      openLogin();
      return;
    }
    if (data.user.tier !== 'pro') {
      showToast('需要 Pro 会员才能使用', true);
      openPricing();
      return;
    }
  }

  // 防刷:同一 wf 5 秒内只算 1 次点击
  const recentClicks = data.clicks.filter(c =>
    c.workflow_id === wfId && (Date.now() - new Date(c.clicked_at).getTime()) < 5000
  );
  if (recentClicks.length > 0) {
    showToast('请稍后再点击', true);
    return;
  }

  // 找到立即使用按钮,显示加载状态
  const ctaButtons = document.querySelectorAll('.side-cta:not(.outline)');
  ctaButtons.forEach(btn => {
    if (btn.textContent.includes('立即使用') || btn.textContent.includes('解锁')) {
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>&nbsp;准备启动…';
    }
  });

  // 记录点击
  const clickObj = {
    id: 'clk_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    workflow_id: wfId,
    user_id: data.user ? data.user.id : null,
    clicked_at: new Date().toISOString()
  };
  data.clicks.push(clickObj);
  saveData(data);
  if (_apiLoaded) {
    apiPost('/workflows/' + wfId + '/click', {
      source: 'market',
      user_id: data.user ? data.user.id : null
    });
  }

  // 跳转(归因参数)
  const url = new URL(wf.target_url);
  url.searchParams.set('from', 'flowhub');
  url.searchParams.set('wf_id', wfId);
  if (data.user) url.searchParams.set('uid', data.user.id);

  if (wf.type === 'recommend') {
    showRedirectTransition(wf, url.toString());
    ctaButtons.forEach(btn => { btn.disabled = false; btn.innerHTML = '<i class="fas fa-external-link-alt"></i>&nbsp;访问官网'; });
  } else {
    showToast(`正在启动 ${wf.name}…`);
    setTimeout(() => {
      ctaButtons.forEach(btn => { btn.disabled = false; btn.innerHTML = '<i class="fas fa-play"></i>&nbsp;立即使用'; });
      render();
    }, 800);
  }
}

function showRedirectTransition(wf, targetUrl) {
  let countdown = 3;
  let host = '';
  try { host = new URL(targetUrl).hostname; } catch(e) { host = targetUrl; }
  const overlay = document.createElement('div');
  overlay.className = 'redirect-overlay';
  overlay.innerHTML = `
    <div class="redirect-card">
      <div class="redirect-icon" style="background:${wf.cover_color}22;color:${wf.cover_color}">
        <i class="fas fa-external-link-alt"></i>
      </div>
      <h3>即将离开 FlowHub</h3>
      <p class="redirect-target">${escapeHtml(wf.name)}</p>
      <p class="redirect-host">${escapeHtml(host)}</p>
      <div class="redirect-countdown">
        <div class="redirect-ring">
          <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="none" stroke="var(--line)" stroke-width="2.5"/><circle class="redirect-ring-fill" cx="20" cy="20" r="18" fill="none" stroke="${wf.cover_color}" stroke-width="2.5" stroke-dasharray="113" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 20 20)"/></svg>
          <span class="redirect-num">${countdown}</span>
        </div>
      </div>
      <p class="redirect-hint">秒后自动跳转</p>
      <div class="redirect-actions">
        <button class="redirect-go" onclick="window.open('${targetUrl.replace(/'/g, "\\'")}', '_blank'); this.closest('.redirect-overlay').remove()">
          <i class="fas fa-arrow-right"></i> 立即前往
        </button>
        <button class="redirect-cancel" onclick="this.closest('.redirect-overlay').remove()">取消</button>
      </div>
      <p class="redirect-disclaimer">你即将访问第三方网站,FlowHub 不对其内容负责</p>
    </div>
  `;
  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('show'));

  const ring = overlay.querySelector('.redirect-ring-fill');
  const numEl = overlay.querySelector('.redirect-num');
  const step = 113 / countdown;
  const timer = setInterval(() => {
    countdown--;
    if (numEl) numEl.textContent = countdown;
    if (ring) ring.style.strokeDashoffset = (3 - countdown) * step;
    if (countdown <= 0) {
      clearInterval(timer);
      window.open(targetUrl, '_blank');
      overlay.remove();
    }
  }, 1000);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) { clearInterval(timer); overlay.remove(); } });
}

function quickSearch(q) {
  state.searchQuery = q;
  state.activeCategory = '全部';
  addSearchHistory(q);
  hideSearchDropdown();
  renderMarket();
}

function getSearchHistory() {
  try { return JSON.parse(localStorage.getItem('flowhub_search_history') || '[]'); } catch { return []; }
}
function addSearchHistory(q) {
  if (!q || q.length < 2) return;
  let h = getSearchHistory().filter(x => x !== q);
  h.unshift(q);
  if (h.length > 8) h = h.slice(0, 8);
  localStorage.setItem('flowhub_search_history', JSON.stringify(h));
}
function clearSearchHistory() {
  localStorage.removeItem('flowhub_search_history');
  showSearchDropdown();
}

function showSearchDropdown() {
  const dd = document.getElementById('search-dropdown');
  if (!dd) return;
  const history = getSearchHistory();
  const hotTags = ['小红书', '商品图', '翻译', 'SQL', '海报', '会议纪要', '代码审查', '简历'];
  dd.innerHTML = `
    ${history.length > 0 ? `

        <span>搜索历史</span>
        <span class="search-dropdown-clear" onclick="event.stopPropagation(); clearSearchHistory()">清除</span>
      </div>
      ${history.map(h => `

const LIVE_USERS = ['用户***18', '小红书运营***', '电商小赵***', '某 MCN***', '跨境老王***', '设计师***', '咖啡店主***', '宝妈***', '某独立站***', '内容创业者***'];
const LIVE_ACTIONS = ['正在使用', '调用了', '订阅了', '收藏了', '完成了', '推荐了'];

function renderLiveFeedItems() {
  const data = getData();
  const wfs = data.workflows.filter(w => w.status === 'active');
  const items = [];
  for (let i = 0; i < 8; i++) {
    const user = LIVE_USERS[Math.floor(Math.random() * LIVE_USERS.length)];
    const wf = wfs[Math.floor(Math.random() * wfs.length)];
    const action = LIVE_ACTIONS[Math.floor(Math.random() * LIVE_ACTIONS.length)];
    if (!wf) continue;
    const seconds = Math.floor(Math.random() * 60);
    items.push(`<div class="live-feed-item"><strong>${user}</strong> ${action} <span class="wf-name">${escapeHtml(wf.name)}</span> · ${seconds} 秒前</div>`);
  }
  return items.join('');
}

let liveFeedTimer = null;
function startLiveFeed() {
  if (liveFeedTimer) clearInterval(liveFeedTimer);
  liveFeedTimer = setInterval(() => {
    const container = document.getElementById('live-feed-items');
    if (!container) return;
    // 添加新的一行到顶部
    const data = getData();
    const wfs = data.workflows.filter(w => w.status === 'active');
    if (wfs.length === 0) return;
    const user = LIVE_USERS[Math.floor(Math.random() * LIVE_USERS.length)];
    const wf = wfs[Math.floor(Math.random() * wfs.length)];
    const action = LIVE_ACTIONS[Math.floor(Math.random() * LIVE_ACTIONS.length)];
    const newItem = document.createElement('div');
    newItem.className = 'live-feed-item';
    newItem.innerHTML = `<strong>${user}</strong> ${action} <span class="wf-name">${escapeHtml(wf.name)}</span> · 刚刚`;
    newItem.style.cssText = 'opacity: 0; transition: opacity 0.5s';
    container.insertBefore(newItem, container.firstChild);
    setTimeout(() => newItem.style.opacity = '1', 50);
    // 移除底部多余项
    while (container.children.length > 12) {
      container.removeChild(container.lastChild);
    }
    // 平移动画
    container.style.transform = 'translateY(-18px)';
    setTimeout(() => {
      container.style.transition = 'none';
      container.style.transform = 'translateY(0)';
      container.removeChild(container.firstChild);
      setTimeout(() => {
        container.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)';
      }, 50);
    }, 500);
  }, 3000);
}

function galleryNav(wfId, dir) {
  const gallery = document.getElementById('gallery-' + wfId);
  if (!gallery) return;
  const slides = gallery.querySelectorAll('.gallery-slide');
  let current = 0;
  slides.forEach((s, i) => { if (s.classList.contains('active')) current = i; });
  const next = (current + dir + slides.length) % slides.length;
  galleryGoTo(wfId, next);
}

function galleryGoTo(wfId, idx) {
  const gallery = document.getElementById('gallery-' + wfId);
  if (!gallery) return;
  gallery.querySelectorAll('.gallery-slide').forEach((s, i) => s.classList.toggle('active', i === idx));
  gallery.querySelectorAll('.gallery-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  gallery.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
}

function readNotif(id) {
  const data = getData();
  if (data._notifs) {
    const n = data._notifs.find(x => x.id === id);
    if (n) n.read = true;
    saveData(data);
    render();
  }
}

function markAllRead(e) {
  e.stopPropagation();

  if (data._notifs) {
    data._notifs.forEach(n => n.read = true);
    saveData(data);
    showToast('全部标为已读');
    render();
  }
}

function renderRelatedWorkflows(currentWf) {
  const data = getData();
  // 相关:同分类的 / 同标签的,排除自己
  const related = data.workflows
    .filter(w => w.id !== currentWf.id && w.status === 'active')
    .map(w => {
      let score = 0;
      if (w.category === currentWf.category) score += 10;
      if (w.type === currentWf.type) score += 3;
      // 标签匹配
      if (w.tags && currentWf.tags) {
        const overlap = w.tags.filter(t => currentWf.tags.includes(t)).length;
        score += overlap * 5;
      }
      // 评分加成
      score += w.rating;
      return { ...w, _score: score };
    })
    .sort((a, b) => b._score - a._score)
    .slice(0, 4);

  if (related.length === 0) return '';

  return `
    <section class="related-section">
      <div class="section-head">
        <span class="sec-tag" style="background:var(--bg-soft);color:var(--ink-2)"><i class="fas fa-link" style="font-size:9px"></i> 相关</span>
        <h2>看了这个工作流的人,也在用</h2>
      </div>
      <div class="wf-grid wf-grid-full">
        ${related.map(renderWfCard).join('')}
      </div>
    </section>
  `;
}

function submitReview(wfId) {
  const data = getData();
  const rating = parseInt(document.getElementById('rv-rating').value);
  const text = document.getElementById('rv-text').value.trim();
  if (!text) return showToast('请填写评价内容', true);

  const reviewObj = {
    id: 'rv_' + Date.now(),
    workflow_id: wfId,
    user_name: data.user.name,
    avatar: data.user.name.charAt(0),
    rating: rating,
    text: text,
    date: '刚刚'
  };
  data.reviews.unshift(reviewObj);
  const wf = data.workflows.find(w => w.id === wfId);
  if (wf) {
    const newCount = wf.review_count + 1;
    wf.rating = ((wf.rating * wf.review_count + rating) / newCount).toFixed(1) * 1;
    wf.review_count = newCount;
  }
  saveData(data);
  if (_apiLoaded) {
    delete _reviewsCache[wfId];
    apiPost('/workflows/' + wfId + '/reviews', {
      user_name: reviewObj.user_name,
      avatar: reviewObj.avatar,
      rating: rating,
      text: text
    });
  }
  closeModal();
  showToast('评价已发布');
  renderDetail();
}

let _codeTimer = null;
async function sendEmailCode() {
  const email = document.getElementById('auth-email').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    return showToast('请输入正确的邮箱地址', true);
  }
  const btn = document.getElementById('auth-sms-btn');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '发送中…';
  btn.style.opacity = '0.6';

  try {
    const resp = await fetch(API_BASE + '/auth/send-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const result = await resp.json();
    if (!resp.ok) {
      btn.disabled = false;
      btn.textContent = '获取验证码';
      btn.style.opacity = '1';
      return showToast(result.error?.message || '发送失败', true);
    }
    showToast('验证码已发送到邮箱');
    let sec = 60;
    btn.textContent = `${sec}s`;
    _codeTimer = setInterval(() => {
      sec--;
      if (sec <= 0) {
        clearInterval(_codeTimer);
        btn.disabled = false;
        btn.textContent = '获取验证码';
        btn.style.opacity = '1';
      } else {
        btn.textContent = `${sec}s`;
      }
    }, 1000);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '获取验证码';
    btn.style.opacity = '1';
    showToast('网络错误，请稍后重试', true);
  }
}

async function doAuth(type) {
  const email = document.getElementById('auth-email').value.trim();
  const code = document.getElementById('auth-code').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showToast('请输入正确的邮箱地址', true);
  if (!code || code.length !== 6) return showToast('请输入 6 位验证码', true);

  const name = type === 'register'
    ? (document.getElementById('auth-name').value.trim() || '新用户')
    : undefined;

  const btn = document.querySelector('.auth-submit-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 处理中…'; }

  if (_apiLoaded) {
    try {
      const endpoint = type === 'register' ? '/auth/register' : '/auth/login';
      const body = type === 'register' ? { email, code, name } : { email, code };
      const resp = await fetch(API_BASE + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const result = await resp.json();

      if (!resp.ok) {
        if (btn) { btn.disabled = false; btn.innerHTML = type === 'login' ? '登录' : '注册并登录'; }
        if (result.error?.code === 'USER_NOT_FOUND') return showToast('该邮箱未注册，请先注册', true);
        if (result.error?.code === 'USER_EXISTS') return showToast('该邮箱已注册，请直接登录', true);
        return showToast(result.error?.message || '操作失败', true);
      }

      localStorage.setItem('flowhub_token', result.data.token);
      const data = getData();
      data.user = result.data.user;
      saveData(data);
      closeModal();
      render();
      updateUserStatus();
      if (result.data.user.role === 'admin') loadAdDataAsync().then(render);
      setTimeout(() => showWelcomePop(result.data.user.name, type === 'register'), 400);
      return;
    } catch (e) {
      console.warn('API auth failed, falling back to local:', e.message);
    }
  }

  const data = getData();
  data.user = {
    id: 'u_' + email.replace(/[@.]/g, '_'),
    email: email,
    name: name || ('用户' + email.split('@')[0].slice(-4)),
    tier: 'free',
    role: 'user',
    created_at: new Date().toISOString()
  };
  saveData(data);
  closeModal();
  render();
  updateUserStatus();
  setTimeout(() => showWelcomePop(data.user.name, type === 'register'), 400);
}

async function restoreSession() {
  const token = localStorage.getItem('flowhub_token');
  if (!token || !_apiLoaded) return;
  try {
    const resp = await fetch(API_BASE + '/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!resp.ok) { localStorage.removeItem('flowhub_token'); return; }
    const result = await resp.json();
    if (result.ok && result.data.user) {
      const data = getData();
      data.user = result.data.user;
      saveData(data);
      render();
      updateUserStatus();
      if (result.data.user.role === 'admin') loadAdDataAsync().then(render);
    }
  } catch (e) {
    console.warn('Session restore failed:', e.message);
  }
}

  showToast('订阅已取消(演示版,周期结束后会自动降级)');
}

function timeAgo(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  if (ms < 60000) return '刚刚';
  if (ms < 3600000) return Math.floor(ms / 60000) + ' 分钟前';
  if (ms < 86400000) return Math.floor(ms / 3600000) + ' 小时前';
  return Math.floor(ms / 86400000) + ' 天前';
}

function renderMiniChart(values, color, width) {
  const w = width || 140;
  const h = 40;
  const max = Math.max(...values);
  const min = Math.min(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 6) - 3;
    return `${x},${y}`;
  }).join(' ');
  const area = `M 0,${h} L ${pts.split(' ').join(' L ')} L ${w},${h} Z`;
  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;display:block">
      <defs>
        <linearGradient id="mg-${color.replace('#','')}-${w}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${area}" fill="url(#mg-${color.replace('#','')}-${w})"/>
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${w}" cy="${h - ((values[values.length-1] - min) / range) * (h - 6) - 3}" r="2.5" fill="${color}"/>
    </svg>
  `;
}

function renderTrendChart() {
  const data = getData();
  // 生成 30 天数据
  const days = 30;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const selfData = [];
  const adData = [];
  for (let i = days - 1; i >= 0; i--) {
    const day = today.getTime() - i * 86400000;
    const dayEnd = day + 86400000;
    let selfDay = 0, adDay = 0;
    data.clicks.forEach(c => {
      const t = new Date(c.clicked_at).getTime();
      if (t >= day && t < dayEnd) {
        const wf = data.workflows.find(w => w.id === c.workflow_id);
        if (wf?.type === 'self') selfDay++; else adDay++;
      }
    });
    // 加点模拟基数
    selfData.push(selfDay + Math.floor(80 + i * 4 + Math.random() * 30));
    adData.push(adDay + Math.floor(40 + i * 1.5 + Math.random() * 20));
  }

  const w = 900, h = 220;
  const maxVal = Math.max(...selfData, ...adData);
  const pts = (arr) => arr.map((v, i) => `${i * (w / (days - 1))},${h - (v / maxVal) * (h - 30) - 10}`).join(' ');
  const area = (arr) => `M ${pts(arr).split(' ')[0]} L ${pts(arr).split(' ').slice(1).join(' L ')} L ${w},${h} L 0,${h} Z`;

  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:200px">
      <line x1="0" y1="40" x2="${w}" y2="40" stroke="#EFEEE9" stroke-width="1"/>
      <line x1="0" y1="110" x2="${w}" y2="110" stroke="#EFEEE9" stroke-width="1"/>
      <line x1="0" y1="180" x2="${w}" y2="180" stroke="#EFEEE9" stroke-width="1"/>
      <path d="${area(selfData)}" fill="#1A5D3A" fill-opacity="0.1"/>
      <polyline points="${pts(selfData)}" fill="none" stroke="#1A5D3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="${pts(adData)}" fill="none" stroke="#B85C00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${(days - 1) * (w / (days - 1))}" cy="${h - (selfData[days - 1] / maxVal) * (h - 30) - 10}" r="4" fill="#1A5D3A"/>
      <circle cx="${(days - 1) * (w / (days - 1))}" cy="${h - (adData[days - 1] / maxVal) * (h - 30) - 10}" r="4" fill="#B85C00"/>
    </svg>
  `;
}

function saveWf() {
  const name = document.getElementById('wf-name').value.trim();
  const url = document.getElementById('wf-url').value.trim();
  if (!name) return showToast('请填写名称', true);
  if (!url) return showToast('请填写跳转 URL', true);
  try { new URL(url); } catch { return showToast('URL 格式不正确', true); }

  const data = getData();
  const newData = {
    name,
    tagline: document.getElementById('wf-tagline').value.trim(),
    description: document.getElementById('wf-desc').value.trim(),
    target_url: url,
    type: document.getElementById('wf-type').value,
    category: document.getElementById('wf-category').value,
    price_model: document.getElementById('wf-price-model').value,
    price_amount: parseFloat(document.getElementById('wf-price-amount').value) || 0,
    cover_color: document.querySelector('.color-swatch.active').dataset.color,
    tags: document.getElementById('wf-tags').value.split(',').map(t => t.trim()).filter(Boolean)
  };

  if (state.editingWfId) {
    const wf = data.workflows.find(w => w.id === state.editingWfId);
    Object.assign(wf, newData);
    showToast('已更新工作流');
  } else {
    data.workflows.unshift({
      id: 'wf_' + Date.now() + '_' + Math.random().toString(36).slice(2, 5),
      ...newData,
      status: 'active',
      rating: 5.0,
      review_count: 0,
      examples: [],
      created_at: new Date().toISOString()
    });
    showToast('已添加工作流');
  }
  saveData(data);
  closeModal();
  renderAdmin();
}

function copyCode(btn) {
  const code = btn.parentElement.innerText.replace(/^\s*(NGINX|JAVASCRIPT|.*?)\s*复制\s*/i, '').trim();
  navigator.clipboard?.writeText(code).then(() => {
    const orig = btn.textContent;
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function renderCreatorEarningChart() {
  const days = 30;
  const subscription = [];
  const promo = [];
  for (let i = 0; i < days; i++) {
    subscription.push(Math.floor(180 + i * 8 + Math.random() * 60));
    promo.push(Math.floor(40 + i * 1.2 + Math.random() * 20));
  }
  const w = 900, h = 220;
  const maxVal = Math.max(...subscription, ...promo);
  const pts = (arr) => arr.map((v, i) => `${i * (w / (days - 1))},${h - (v / maxVal) * (h - 30) - 10}`).join(' ');

  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:200px">
      <line x1="0" y1="40" x2="${w}" y2="40" stroke="#EFEEE9" stroke-width="1"/>
      <line x1="0" y1="110" x2="${w}" y2="110" stroke="#EFEEE9" stroke-width="1"/>
      <line x1="0" y1="180" x2="${w}" y2="180" stroke="#EFEEE9" stroke-width="1"/>
      <path d="M 0 ${h} L ${pts(subscription)} L ${w} ${h} Z" fill="#1A5D3A" fill-opacity="0.12"/>
      <polyline points="${pts(subscription)}" fill="none" stroke="#1A5D3A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="${pts(promo)}" fill="none" stroke="#B85C00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${(days - 1) * (w / (days - 1))}" cy="${h - (subscription[days - 1] / maxVal) * (h - 30) - 10}" r="4" fill="#1A5D3A"/>
      <circle cx="${(days - 1) * (w / (days - 1))}" cy="${h - (promo[days - 1] / maxVal) * (h - 30) - 10}" r="4" fill="#B85C00"/>
    </svg>
  `;
}

let chatbotOpen = false;

function toggleChatbot() {
  chatbotOpen = !chatbotOpen;
  const panel = document.getElementById('chatbot-panel');
  const fab = document.getElementById('chatbot-fab');
  panel.classList.toggle('show', chatbotOpen);
  // 打开时清除红点
  const badge = fab.querySelector('.chatbot-badge');
  if (chatbotOpen && badge) badge.style.display = 'none';
}

function askChatbot(q) {
  document.getElementById('chatbot-input').value = q;
  sendChatMsg();
}

function sendChatMsg() {
  const input = document.getElementById('chatbot-input');
  const text = input.value.trim();
  if (!text) return;
  const body = document.getElementById('chatbot-body');

  // 移除之前的建议
  body.querySelectorAll('.chat-suggestions').forEach(el => el.remove());

  // 用户消息
  const userMsg = document.createElement('div');
  userMsg.className = 'chat-msg user';
  userMsg.innerHTML = `<div class="chat-bubble">${escapeHtml(text)}</div>`;
  body.appendChild(userMsg);
  input.value = '';

  // 滚动到底
  body.scrollTop = body.scrollHeight;

  // 打字指示
  const typing = document.createElement('div');
  typing.className = 'chat-msg bot';
  typing.id = 'chat-typing';
  typing.innerHTML = `<div class="chat-typing"><span></span><span></span><span></span></div>`;
  body.appendChild(typing);
  body.scrollTop = body.scrollHeight;

  // 模拟回复
  setTimeout(() => {
    typing.remove();
    const reply = getChatReply(text);
    const botMsg = document.createElement('div');
    botMsg.className = 'chat-msg bot';
    botMsg.innerHTML = `<div class="chat-bubble">${reply.text}</div>`;
    body.appendChild(botMsg);

    // 如果有建议,加上
    if (reply.suggestions && reply.suggestions.length) {
      const sg = document.createElement('div');
      sg.className = 'chat-suggestions';
      sg.innerHTML = reply.suggestions.map(s => `<button class="chat-suggest" onclick="askChatbot('${s.replace(/'/g, "\\'")}')">${escapeHtml(s)}</button>`).join('');
      body.appendChild(sg);
    }

    body.scrollTop = body.scrollHeight;
  }, 800 + Math.random() * 400);
}
